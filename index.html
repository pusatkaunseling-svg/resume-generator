<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSKA Resume Helper v125.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="resume-styles">
        @page { size: A4; margin: 12.7mm; }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        body { background: #e5e7eb; margin: 0; padding: 0; height: 100vh; overflow: hidden; }

        /* LAYOUT STABIL */
        .main-wrapper { display: flex; flex-direction: row; height: 100vh; width: 100vw; overflow: hidden; }
        .form-side { width: 50%; height: 100%; overflow-y: auto; padding: 25px; background: white; border-right: 2px solid #e5e7eb; }
        .preview-side { width: 50%; height: 100%; overflow-y: auto; padding: 20px; background: #9ca3af; display: flex; justify-content: center; }

        /* RESUME PREVIEW */
        #pdf-area {
            font-family: 'Arial', sans-serif; color: black; line-height: 1.3; background: white;
            width: 210mm; min-height: 297mm; padding: 15mm; margin: 20px auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.4); position: relative;
            transform: scale(0.45); transform-origin: top center;
        }
        #pdf-area h1 { font-size: 16pt; font-weight: bold; text-transform: uppercase; margin: 0; text-align: center; width: 100%; }
        #p-contact { font-size: 9.5pt; margin: 4px 0; color: #333; text-align: center; width: 100%; }
        #pdf-area h2 { border-bottom: 1.5px solid #333; margin-top: 10px; margin-bottom: 5px; font-size: 10.5pt; font-weight: bold; text-transform: uppercase; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 9.5pt; margin-top: 3px; }
        #pdf-area ul { list-style-type: disc !important; margin-left: 1.2rem !important; padding: 0; font-size: 9pt; }
        .section-content { font-size: 9.5pt; margin-bottom: 6px; }

        /* UI ELEMENTS */
        input, select, textarea { font-size: 12px !important; padding: 8px !important; border: 1px solid #d1d5db !important; border-radius: 6px !important; width: 100%; margin-bottom: 4px; }
        label { font-size: 10px; font-weight: 800; color: #4b5563; text-transform: uppercase; margin-top: 8px; display: block; }
        .ai-btn { background: linear-gradient(45deg, #8b5cf6, #6d28d9); color: white; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: bold; cursor: pointer; border: none; }
        
        #ai-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; }

        /* PHOTO LAYOUT */
        .template-photo header { flex-direction: row !important; text-align: left !important; border-bottom: 4px solid #1e3a8a; padding-bottom: 10px; }
        .template-photo #photo-preview { width: 35mm; height: 45mm; object-fit: cover; margin-right: 20px; display: block !important; border: 1px solid #ccc; }
        .template-photo h2 { background: #1e3a8a !important; color: white !important; border: none !important; padding: 5px 10px !important; }
    </style>
</head>
<body>

    <div id="ai-modal">
        <div class="modal-content text-center">
            <h3 class="font-black text-lg text-purple-700 uppercase mb-4">✨ AI Prompt Generator</h3>
            <div id="prompt-text" class="p-4 bg-gray-50 border rounded-xl text-sm italic mb-6 text-left"></div>
            <div class="flex gap-2">
                <button onclick="copyAndClose()" class="flex-1 bg-purple-600 text-white font-bold py-3 rounded-xl uppercase">Copy & Close</button>
                <button onclick="closeModal()" class="px-6 bg-gray-200 rounded-xl font-bold uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        
        <div class="form-side no-print">
            <div class="bg-blue-900 p-5 rounded-xl text-white mb-6 flex items-center gap-4 shadow-lg">
                <img src="https://i.ibb.co/3sXz6wT/logo-unimap.png" alt="UniMAP" class="h-8">
                <h1 class="text-lg font-black uppercase">PUSKA Resume Helper</h1>
            </div>

            <div class="space-y-6">
                <div class="bg-gray-50 p-4 rounded-xl border-2 border-dashed">
                    <label>PROGRAM PENGAJIAN</label>
                    <select id="prog" onchange="runUpdate()" class="font-bold">
                        <option value="" disabled selected>--- SILA PILIH PROGRAM ---</option>
                        <option>Bachelor of Applied Science (Materials & Metallurgy Technology) with Honours</option>
                        <option>Bachelor of Agricultural Engineering with Honours</option>
                        <option>Bachelor of Automotive Technology with Honours</option>
                        <option>Bachelor of Biomedical Electronic Engineering with Honours</option>
                        <option>Bachelor of Building Construction Technology with Honours</option>
                        <option>Bachelor of Business (Engineering Entrepreneurship) with Honours</option>
                        <option>Bachelor of Business (International Business) with Honours</option>
                        <option>Bachelor of Chemical Engineering with Honours</option>
                        <option>Bachelor of Civil Engineering with Honours</option>
                        <option>Bachelor of Computer Engineering with Honours</option>
                        <option>Bachelor of Data Science (Artificial Intelligence) with Honours</option>
                        <option>Bachelor of Electrical Engineering with Honours</option>
                        <option>Bachelor of Electronic Engineering with Honours</option>
                        <option>Bachelor of Environmental Engineering with Honours</option>
                        <option>Bachelor of Manufacturing Engineering with Honours</option>
                        <option>Bachelor of Materials Engineering with Honours</option>
                        <option>Bachelor of Mechanical Engineering with Honours</option>
                        <option>Bachelor of Mechatronic Engineering with Honours</option>
                        <option>Bachelor of Metallurgical Engineering with Honours</option>
                        <option>Bachelor of Microelectronic Engineering with Honours</option>
                        <option>Bachelor of New Media Communication with Honours</option>
                        <option>Bachelor of Perakaunan (Accounting) with Honours</option>
                        <option>Bachelor of Polymer Engineering with Honours</option>
                        <option>Diploma in Civil Engineering</option>
                        <option>Diploma in Computer Engineering</option>
                        <option>Diploma in Electrical Engineering</option>
                        <option>Diploma in Electronic Engineering</option>
                        <option>Diploma in Manufacturing Engineering</option>
                        <option>Diploma in Mechanical Engineering Technology</option>
                        <option>Diploma in Mechatronic Engineering</option>
                    </select>
                    
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <div>
                            <label>LEVEL</label>
                            <select id="level">
                                <option>Diploma</option>
                                <option selected>Bachelor</option>
                                <option>Master's Degree</option>
                                <option>PhD</option>
                            </select>
                        </div>
                        <div><label>CGPA</label><input type="text" id="main_cgpa" placeholder="3.85" oninput="runUpdate()"></div>
                    </div>
                </div>

                <section class="p-4 border rounded-xl shadow-sm bg-white">
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <label class="cursor-pointer border p-2 rounded text-center"><input type="radio" name="resType" value="ATS" checked onchange="toggleLayout()"> ATS</label>
                        <label class="cursor-pointer border p-2 rounded text-center"><input type="radio" name="resType" value="Photo" onchange="toggleLayout()"> PHOTO</label>
                    </div>
                    <div id="photo-input-area" class="hidden mb-4"><input type="file" onchange="loadPhoto(this)"></div>
                    <label>FULL NAME</label><input type="text" id="fullName" class="uppercase font-bold" oninput="runUpdate()">
                    <input type="text" id="email" placeholder="Email" oninput="runUpdate()">
                    <input type="text" id="phone" placeholder="Phone Number" oninput="runUpdate()">
                    <input type="text" id="address" placeholder="ARAU, PERLIS" class="uppercase" oninput="runUpdate()">
                    <input type="text" id="linkedin" placeholder="LinkedIn URL" oninput="runUpdate()">
                </section>

                <section class="p-4 border rounded-xl bg-white">
                    <div class="flex justify-between items-center"><label>SUMMARY</label><button onclick="openAI('summary', event)" class="ai-btn">✨ AI</button></div>
                    <textarea id="summary" class="h-20" oninput="runUpdate()"></textarea>
                </section>

                <section class="p-4 border rounded-xl bg-gray-50">
                    <div class="flex justify-between items-center mb-2"><b>EDUCATION</b><button onclick="addEntry('edu-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div>
                    <div id="edu-list">
                        <div class="p-3 border bg-white rounded-lg entry mb-2 space-y-1">
                            <input type="text" placeholder="UNIVERSITY" class="font-bold uppercase" oninput="runUpdate()">
                            <input type="text" placeholder="COURSE NAME" oninput="runUpdate()">
                            <div class="grid grid-cols-3 gap-1"><input type="text" placeholder="CGPA" oninput="runUpdate()"><input type="text" placeholder="START" oninput="runUpdate()"><input type="text" placeholder="END" oninput="runUpdate()"></div>
                        </div>
                    </div>
                </section>

                <section class="p-4 border rounded-xl bg-gray-50">
                    <div class="flex justify-between items-center mb-2"><b>WORK EXPERIENCE</b><button onclick="addEntry('work-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div>
                    <div id="work-list">
                        <div class="p-3 border bg-white rounded-lg entry mb-2 space-y-1">
                            <input type="text" placeholder="POSITION" class="font-bold uppercase" oninput="runUpdate()">
                            <input type="text" placeholder="COMPANY" oninput="runUpdate()">
                            <div class="grid grid-cols-2 gap-1"><input type="text" placeholder="START" oninput="runUpdate()"><input type="text" placeholder="END" oninput="runUpdate()"></div>
                            <textarea class="h-20 mt-1" placeholder="Tasks (Enter for new bullet)" oninput="runUpdate()"></textarea>
                        </div>
                    </div>
                </section>

                <div class="grid grid-cols-2 gap-2">
                    <section class="p-3 border rounded bg-white"><label>TECH SKILLS</label><textarea id="tech_sk" oninput="runUpdate()"></textarea></section>
                    <section class="p-3 border rounded bg-white"><label>SOFT SKILLS</label><textarea id="soft_sk" oninput="runUpdate()"></textarea></section>
                </div>

                <section class="p-4 border rounded-xl bg-gray-50">
                    <div class="flex justify-between items-center mb-2"><b>EXTRA ACTIVITIES</b><button onclick="addEntry('act-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div>
                    <div id="act-list">
                        <div class="p-3 border bg-white rounded-lg entry mb-2 space-y-1">
                            <input type="text" placeholder="ACTIVITY NAME" class="font-bold uppercase" oninput="runUpdate()">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" placeholder="ORGANIZER" oninput="runUpdate()">
                                <input type="text" placeholder="YEAR" oninput="runUpdate()">
                            </div>
                            <textarea class="h-16" placeholder="Details (Bullets)..." oninput="runUpdate()"></textarea>
                        </div>
                    </div>
                </section>

                <section class="p-4 border rounded-xl bg-gray-50">
                    <div class="flex justify-between items-center mb-2"><b>REFERENCES</b><button onclick="addEntry('ref-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div>
                    <div id="ref-list">
                        <div class="p-3 border bg-white rounded-lg entry mb-2 space-y-1">
                            <input type="text" placeholder="NAME" class="font-bold uppercase" oninput="runUpdate()">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" placeholder="POSITION" oninput="runUpdate()">
                                <input type="text" placeholder="ORGANIZATION" oninput="runUpdate()">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" placeholder="EMAIL" oninput="runUpdate()">
                                <input type="text" placeholder="PHONE" oninput="runUpdate()">
                            </div>
                        </div>
                    </div>
                </section>

                <button onclick="submitDatabase()" id="btnSubmit" class="w-full bg-blue-800 text-white py-4 rounded-xl font-bold uppercase shadow-xl mb-10">Submit & Download</button>
            </div>
        </div>

        <div class="preview-side">
            <div id="pdf-area">
                <header>
                    <img id="photo-preview" src="" class="hidden">
                    <div style="width:100%;">
                        <h1 id="p-name">FULL NAME</h1>
                        <p id="p-contact"></p>
                        <div id="p-linkedin-preview"></div>
                    </div>
                </header>
                <section id="s-summary"><h2>Summary</h2><p id="p-summary" class="section-content text-justify"></p></section>
                <section id="s-edu"><h2>Education</h2><div id="p-edu"></div></section>
                <section id="s-work"><h2>Work Experience</h2><div id="p-work"></div></section>
                <div class="grid grid-cols-2 gap-6" id="s-skills">
                    <section><h2>Technical Skills</h2><p id="p-tech" class="section-content whitespace-pre-line"></p></section>
                    <section><h2>Soft Skills</h2><p id="p-soft" class="section-content whitespace-pre-line"></p></section>
                </div>
                <section id="s-act"><h2>Activities</h2><div id="p-act"></div></section>
                <section id="s-ref"><h2>References</h2><div id="p-ref" class="grid grid-cols-2 gap-4"></div></section>
            </div>
        </div>

    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxP0nLz0K39vvKXlXaHiNpsFC6ph9amrRCFSIcLHcHbC7waebzlb6i_18pJqowuT_L2ag/exec";

        function openAI(type, event) {
            const prog = document.getElementById('prog').value;
            let prompt = "";
            if(type === 'summary') prompt = `Write a professional 3-line resume summary for a ${prog} student.`;
            document.getElementById('prompt-text').innerText = prompt;
            document.getElementById('ai-modal').style.display = "block";
        }

        function closeModal() { document.getElementById('ai-modal').style.display = "none"; }
        function copyAndClose() { navigator.clipboard.writeText(document.getElementById('prompt-text').innerText); alert("Disalin!"); closeModal(); }

        function runUpdate() {
            document.getElementById('p-name').innerText = (document.getElementById('fullName').value || 'FULL NAME').toUpperCase();
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const loc = (document.getElementById('address').value || '').toUpperCase();
            document.getElementById('p-contact').innerText = email || phone || loc ? `${email} • ${phone} • ${loc}` : '';
            const li = document.getElementById('linkedin').value;
            document.getElementById('p-linkedin-preview').innerHTML = li ? `<a href="${li.startsWith('http')?li:'https://'+li}" target="_blank" style="color:#1e3a8a;">${li}</a>` : '';

            const sumV = document.getElementById('summary').value;
            document.getElementById('p-summary').innerText = sumV;
            document.getElementById('s-summary').style.display = sumV ? 'block' : 'none';

            const tV = document.getElementById('tech_sk').value;
            const sV = document.getElementById('soft_sk').value;
            document.getElementById('p-tech').innerText = tV;
            document.getElementById('p-soft').innerText = sV;
            document.getElementById('s-skills').style.display = (tV || sV) ? 'grid' : 'none';

            let eduH = '';
            document.querySelectorAll('#edu-list .entry').forEach(el => {
                const i = el.querySelectorAll('input');
                if(i[0].value) eduH += `<div class="mb-3"><div class="item-header"><span>${i[0].value}</span><span>${i[3].value} - ${i[4].value}</span></div><i>${i[1].value}</i><br><b>CGPA: ${i[2].value}</b></div>`;
            });
            document.getElementById('p-edu').innerHTML = eduH;
            document.getElementById('s-edu').style.display = eduH ? 'block' : 'none';

            let workH = '';
            document.querySelectorAll('#work-list .entry').forEach(el => {
                const i = el.querySelectorAll('input');
                const t = el.querySelector('textarea').value;
                if(i[0].value) {
                    const bullets = t.split('\n').filter(l => l.trim()).map(l => `<li>${l}</li>`).join('');
                    workH += `<div class="mb-4"><div class="item-header"><span>${i[0].value}</span><span>${i[2].value} - ${i[3].value}</span></div><i>${i[1].value}</i><ul>${bullets}</ul></div>`;
                }
            });
            document.getElementById('p-work').innerHTML = workH;
            document.getElementById('s-work').style.display = workH ? 'block' : 'none';

            let actH = '';
            document.querySelectorAll('#act-list .entry').forEach(el => {
                const i = el.querySelectorAll('input');
                const t = el.querySelector('textarea').value;
                if(i[0].value) {
                    const bullets = t.split('\n').filter(l => l.trim()).map(l => `<li>${l}</li>`).join('');
                    actH += `<div class="mb-3"><div class="item-header"><span>${i[0].value.toUpperCase()} | ${i[1].value}</span><span>${i[2].value}</span></div><ul>${bullets}</ul></div>`;
                }
            });
            document.getElementById('p-act').innerHTML = actH;
            document.getElementById('s-act').style.display = actH ? 'block' : 'none';

            let refH = '';
            document.querySelectorAll('#ref-list .entry').forEach(el => {
                const i = el.querySelectorAll('input');
                if(i[0].value) {
                    refH += `<div class="text-[9pt] leading-tight mb-2"><b>${i[0].value.toUpperCase()}</b><br>${i[1].value}, ${i[2].value}<br>E: ${i[3].value} | P: ${i[4].value}</div>`;
                }
            });
            document.getElementById('p-ref').innerHTML = refH;
            document.getElementById('s-ref').style.display = refH ? 'block' : 'none';
        }

        async function submitDatabase() {
            const btn = document.getElementById('btnSubmit');
            const fullName = document.getElementById('fullName').value;
            if(!fullName) return alert("Sila isi Nama!");
            btn.innerText = "Processing..."; btn.disabled = true;
            const fullHtml = `<!DOCTYPE html><html><head><style>${document.getElementById('resume-styles').innerHTML} body{background:white;} #pdf-area{box-shadow:none;margin:0;transform:scale(1);}</style></head><body>${document.getElementById('pdf-area').outerHTML}</body></html>`;
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ fullName, htmlContent: fullHtml }) });
                const pW = window.open('', '_blank'); pW.document.write(fullHtml); pW.document.close();
                pW.onload = () => { setTimeout(() => { pW.print(); btn.disabled = false; btn.innerText = "Submit & Download"; }, 500); };
            } catch (e) { alert("Error!"); btn.disabled = false; }
        }

        function addEntry(id) { const container = document.getElementById(id); const clone = container.children[0].cloneNode(true); clone.querySelectorAll('input, textarea').forEach(v => v.value = ''); container.appendChild(clone); runUpdate(); }
        function toggleLayout() { const type = document.querySelector('input[name="resType"]:checked').value; document.getElementById('pdf-area').className = (type === 'Photo') ? 'template-photo' : ''; document.getElementById('photo-input-area').classList.toggle('hidden', type === 'ATS'); runUpdate(); }
        function loadPhoto(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('photo-preview').src = e.target.result; document.getElementById('photo-preview').classList.remove('hidden'); }; r.readAsDataURL(i.files[0]); } }
        window.onload = runUpdate;
    </script>
</body>
</html>
