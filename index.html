<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSKA Resume System v26.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="resume-styles">
        /* --- FORMAT RESUME A4 --- */
        #pdf-area {
            font-family: 'Arial', sans-serif; color: #1a1a1a; line-height: 1.4; background: white;
            width: 210mm; min-height: 297mm; padding: 15mm; box-sizing: border-box; margin: auto;
        }
        #pdf-area h1 { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin: 0; text-align: center; }
        #pdf-area h2 { border-bottom: 2px solid #333; margin-top: 15px; margin-bottom: 5px; font-size: 12pt; font-weight: bold; text-transform: uppercase; text-align: left; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; }
        #pdf-area ul { list-style-type: disc !important; margin-left: 1.2rem !important; margin-top: 2px; }
        .section-content { font-size: 10.5pt; margin-bottom: 8px; }

        /* PHOTO LAYOUT (BLUE) */
        .template-photo header { border-bottom: 3px solid #1e3a8a; padding-bottom: 15px; text-align: left !important; display: flex !important; align-items: center; gap: 20px; }
        .template-photo #photo-preview { width: 110px; height: 140px; border: 1px solid #ddd; object-fit: cover; display: block !important; }
        .template-photo h2 { background: #1e3a8a !important; color: white !important; border: none !important; padding: 5px 10px !important; }

        /* UI Styling for Form Inputs */
        input, select, textarea { font-size: 13px !important; padding: 10px !important; border: 1px solid #d1d5db !important; border-radius: 6px !important; width: 100%; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #1e3a8a !important; outline: none !important; ring: 2px #1e3a8a; }
        label { font-size: 11px; font-weight: 800; color: #374151; text-transform: uppercase; margin-bottom: 4px; display: block; }

        @media (max-width: 1024px) {
            .preview-container { overflow-x: auto; background: #555; padding: 10px; }
            #pdf-area { transform: scale(0.4); transform-origin: top center; }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex flex-col lg:flex-row h-screen">
        
        <div class="lg:w-1/2 p-6 bg-white overflow-y-auto border-r shadow-xl">
            <div class="flex items-center gap-4 mb-6">
                <img src="https://drive.google.com/thumbnail?id=1MvbeFj62QwwzGHvUCNrmjYqX6IrWTQxN&sz=w200" alt="PUSKA" class="max-h-12">
                <h1 class="text-2xl font-black text-blue-900 uppercase">PUSKA v26.0</h1>
            </div>

            <div class="bg-blue-900 p-5 rounded-xl text-white mb-8 space-y-4 shadow-lg">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-white">LEVEL</label><select id="level" class="text-black"><option>Undergraduate</option><option>Diploma</option><option>Postgraduate</option></select></div>
                    <div><label class="text-white">YEAR</label><select id="year" class="text-black"><option>Year 4</option><option>Year 3</option><option>Year 2</option><option>Year 1</option></select></div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2"><label class="text-white">FACULTY</label><select id="faculty" class="text-black"><option>Faculty of Electrical Engineering & Technology</option><option>Faculty of Electronic Engineering & Technology</option><option>Faculty of Chemical Engineering & Technology</option><option>Faculty of Civil Engineering & Technology</option><option>Faculty of Mechanical Engineering & Technology</option><option>Faculty of Intelligent Computing</option><option>Faculty of Business & Communication</option></select></div>
                    <div><label class="text-yellow-400">CGPA (SHEET)</label><input type="text" id="main_cgpa" value="4.00" class="text-black text-center font-bold"></div>
                </div>
                <div><label class="text-white">PROGRAM</label><select id="prog" class="text-black font-semibold"><option>SARJANA MUDA SAINS DATA (KECERDASAN BUATAN)</option><option>SARJANA MUDA KEJURUTERAAN ELEKTRIK</option></select></div>
            </div>

            <div class="space-y-8">
                <section class="p-5 border-2 border-gray-100 rounded-xl bg-white">
                    <b class="text-blue-900 text-sm block border-b pb-2 mb-4">1. PERSONAL INFORMATION</b>
                    <div class="grid grid-cols-2 gap-3 mb-5">
                        <label class="cursor-pointer text-center font-bold border p-3 rounded-lg hover:bg-gray-50"><input type="radio" name="resType" value="ATS" checked onchange="toggleLayout()"> ATS LAYOUT</label>
                        <label class="cursor-pointer text-center font-bold border p-3 rounded-lg hover:bg-gray-50"><input type="radio" name="resType" value="Photo" onchange="toggleLayout()"> PHOTO LAYOUT</label>
                    </div>
                    <div id="photo-input-area" class="hidden mb-4 p-4 bg-gray-50 border-dashed border-2 rounded-xl text-center"><input type="file" accept="image/*" onchange="loadPhoto(this)"></div>
                    
                    <div class="space-y-4">
                        <div><label>FULL NAME</label><input type="text" id="fullName" placeholder="MUHAMAD ZUL IZZAT BIN JAMIL" class="font-bold uppercase" oninput="runUpdate()"></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label>EMAIL</label><input type="text" id="email" placeholder="email@unimap.edu.my" oninput="runUpdate()"></div>
                            <div><label>PHONE NUMBER</label><input type="text" id="phone" placeholder="013-5828069" oninput="runUpdate()"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label>LOCATION</label><input type="text" id="address" placeholder="PASIR GUDANG, JOHOR" class="uppercase" oninput="runUpdate()"></div>
                            <div><label>LINKEDIN URL</label><input type="text" id="linkedin" placeholder="linkedin.com/in/username" oninput="runUpdate()"></div>
                        </div>
                    </div>
                </section>

                <section class="p-5 border-2 border-gray-100 rounded-xl bg-white">
                    <label>2. PROFESSIONAL SUMMARY</label>
                    <textarea id="summary" class="h-28" oninput="runUpdate()">Final-year Bachelor of Data Science (Artificial Intelligence) student with a strong foundation in machine learning, data analysis, and statistical modeling.</textarea>
                </section>

                <section class="p-5 border-2 border-gray-100 rounded-xl bg-gray-50">
                    <div class="flex justify-between items-center mb-4"><b>3. EDUCATION</b><button onclick="addEntry('edu-list')" class="bg-blue-600 text-white px-3 py-1 rounded-lg font-bold">+</button></div>
                    <div id="edu-list">
                        <div class="p-4 border bg-white rounded-xl entry mb-3 space-y-3">
                            <div><label>UNIVERSITY</label><input type="text" placeholder="Universiti Malaysia Perlis" class="font-bold" oninput="runUpdate()"></div>
                            <div><label>DEGREE / DIPLOMA</label><input type="text" placeholder="Bachelor of Data Science" oninput="runUpdate()"></div>
                            <div class="grid grid-cols-3 gap-2">
                                <div><label>CGPA</label><input type="text" placeholder="4.00" oninput="runUpdate()"></div>
                                <div><label>START</label><input type="text" placeholder="2022" oninput="runUpdate()"></div>
                                <div><label>END</label><input type="text" placeholder="2026" oninput="runUpdate()"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="p-5 border-2 border-gray-100 rounded-xl bg-gray-50">
                    <div class="flex justify-between items-center mb-4"><b>10. REFERENCE</b><button onclick="addEntry('ref-list')" class="bg-blue-600 text-white px-3 py-1 rounded-lg font-bold">+</button></div>
                    <div id="ref-list">
                        <div class="p-4 border bg-white rounded-xl entry mb-3 space-y-3">
                            <div><label>REFEREE NAME</label><input type="text" placeholder="Dr. Ali bin Abu" class="font-bold" oninput="runUpdate()"></div>
                            <div class="grid grid-cols-2 gap-2">
                                <div><label>POSITION</label><input type="text" placeholder="Senior Lecturer" oninput="runUpdate()"></div>
                                <div><label>ORGANIZATION</label><input type="text" placeholder="UniMAP" oninput="runUpdate()"></div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div><label>EMAIL</label><input type="text" placeholder="ali@unimap.edu.my" oninput="runUpdate()"></div>
                                <div><label>PHONE</label><input type="text" placeholder="012-3456789" oninput="runUpdate()"></div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="mt-12 grid grid-cols-2 gap-4 pb-20">
                <button onclick="location.reload()" class="bg-gray-400 text-white py-4 rounded-xl font-bold uppercase">Reset</button>
                <button onclick="submitDatabase()" id="btnSubmit" class="bg-blue-800 text-white py-4 rounded-xl font-bold uppercase shadow-xl hover:scale-105 transition-all">Download & Submit</button>
            </div>
        </div>

        <div class="lg:w-1/2 flex justify-center preview-container overflow-y-auto bg-gray-300 no-print">
            <div id="pdf-area" class="shadow-2xl">
                <header class="text-center">
                    <img id="photo-preview" src="" class="hidden" style="width:110px; height:140px; border:1px solid #ddd; object-fit:cover; margin:0 auto 10px;">
                    <div class="w-full">
                        <h1 id="p-name">YOUR FULL NAME</h1>
                        <p id="p-contact" style="font-size: 10.5pt; margin: 8px 0; font-weight: bold; color: #333;"></p>
                        <div id="p-linkedin-area" style="font-size: 10pt; color: #1e3a8a; font-weight: bold;"></div>
                    </div>
                </header>

                <section><h2>Professional Summary</h2><p id="p-summary" class="section-content text-justify"></p></section>
                <section><h2>Education</h2><div id="p-edu"></div></section>
                <section><h2>References</h2><div id="p-ref" class="grid grid-cols-2 gap-4"></div></section>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "GANTIKAN_DENGAN_URL_WEB_APP_ANDA";

        function runUpdate() {
            document.getElementById('p-name').innerText = (document.getElementById('fullName').value || 'YOUR FULL NAME').toUpperCase();
            
            // AMENDMENT 1: Logic Email | Phone | Location sebaris
            const email = document.getElementById('email').value || 'EMAIL';
            const phone = document.getElementById('phone').value || 'PHONE';
            const loc = (document.getElementById('address').value || 'LOCATION').toUpperCase();
            document.getElementById('p-contact').innerText = `${email}  •  ${phone}  •  ${loc}`;
            
            document.getElementById('p-summary').innerText = document.getElementById('summary').value;
            document.getElementById('p-linkedin-area').innerText = document.getElementById('linkedin').value || '';

            fillSection('edu-list', 'p-edu', i => `<div class="mb-3"><div class="item-header"><span>${i[0].value}</span><span>${i[3].value} - ${i[4].value}</span></div><i>${i[1].value}</i><br><b>CGPA: ${i[2].value}</b></div>`);
            
            // AMENDMENT 2: Logic Reference (Position & Org Asing)
            fillSection('ref-list', 'p-ref', i => `<div class="text-[10pt] leading-tight"><b>${i[0].value}</b><br>${i[1].value}, ${i[2].value}<br>E: ${i[3].value}<br>P: ${i[4].value}</div>`);
        }

        async function submitDatabase() {
            const btn = document.getElementById('btnSubmit');
            const name = document.getElementById('fullName').value;
            const resType = document.querySelector('input[name="resType"]:checked').value;
            if(!name) { alert("Sila isi Nama Penuh."); return; }
            
            btn.innerText = "Saving to Drive..."; btn.disabled = true;

            const fullHtml = `<html><head><style>${document.getElementById('resume-styles').innerHTML}</style></head><body><div id="pdf-area" class="${resType==='Photo'?'template-photo':''}">${document.getElementById('pdf-area').innerHTML}</div></body></html>`;

            const payload = {
                resumeType: resType, fullName: name, email: document.getElementById('email').value,
                phone: document.getElementById('phone').value, cgpa: document.getElementById('main_cgpa').value,
                level: document.getElementById('level').value, year: document.getElementById('year').value,
                program: document.getElementById('prog').value, faculty: document.getElementById('faculty').value,
                htmlContent: fullHtml
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("Berjaya Disimpan!");
                const win = window.open('', '_blank'); win.document.write(fullHtml); win.document.close(); win.setTimeout(() => { win.print(); }, 500);
            } catch (e) { alert("Ralat!"); }
            finally { btn.disabled = false; btn.innerText = "Download & Submit"; }
        }

        function fillSection(id, out, tmpl) { let h = ''; document.querySelectorAll(`#${id} .entry`).forEach(el => { const i = el.querySelectorAll('input'); if(i[0].value) h += tmpl(i); }); document.getElementById(out).innerHTML = h; }
        function addEntry(id) { const container = document.getElementById(id); const clone = container.children[0].cloneNode(true); clone.querySelectorAll('input, textarea').forEach(v => v.value = ''); container.appendChild(clone); runUpdate(); }
        function toggleLayout() { const type = document.querySelector('input[name="resType"]:checked').value; document.getElementById('pdf-area').className = (type === 'Photo') ? 'template-photo' : ''; document.getElementById('photo-input-area').classList.toggle('hidden', type === 'ATS'); runUpdate(); }
        function loadPhoto(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('photo-preview').src = e.target.result; document.getElementById('photo-preview').classList.remove('hidden'); }; r.readAsDataURL(i.files[0]); } }
        window.onload = runUpdate;
    </script>
</body>
</html>
