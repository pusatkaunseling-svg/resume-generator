<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSKA Resume Generator - Master v14.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="resume-styles">
        /* --- PAPARAN SKRIN --- */
        .resume-preview {
            font-family: 'Arial', sans-serif; color: #1a1a1a; line-height: 1.4; background: white;
            width: 210mm; min-height: 297mm; padding: 15mm; box-sizing: border-box; border: 1px solid #ddd;
            margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .resume-preview h1 { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin: 0; color: black; text-align: center; }
        .resume-preview h2 { border-bottom: 2px solid #333; margin-top: 12px; margin-bottom: 5px; font-size: 13pt; font-weight: bold; text-transform: uppercase; text-align: left; color: black; }
        .template-standard header { display: flex !important; align-items: center !important; gap: 20px !important; border-bottom: 3px solid #1e3a8a !important; padding-bottom: 15px; text-align: left !important; }
        .template-standard #photo-preview { width: 110px; height: 140px; border: 1px solid #ddd; object-fit: cover; display: block !important; }
        .template-standard h2 { background: #1e3a8a !important; color: white !important; border: none !important; padding: 5px 10px !important; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; }
        .resume-preview ul { list-style-type: disc !important; margin-left: 1.2rem !important; }
        .section-content { font-size: 10.5pt; margin-bottom: 8px; }
        .ai-btn { background: linear-gradient(45deg, #1e3a8a, #3b82f6); color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; border: none; }

        /* --- LOGIK CETAKAN (MENGATASI ISU COPY SISTEM) --- */
        @media print {
            body * { visibility: hidden; }
            #pdf-area, #pdf-area * { visibility: visible; }
            #pdf-area { position: absolute; left: 0; top: 0; width: 210mm !important; border: none !important; box-shadow: none !important; margin: 0 !important; }
            .no-print { display: none !important; }
            @page { size: A4 portrait; margin: 0; }
        }

        @media (max-width: 1024px) {
            .preview-container { overflow-x: auto; background: #eee; padding: 10px; }
            .resume-preview { transform: scale(0.45); transform-origin: top center; }
        }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-4">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <div class="bg-white p-4 md:p-6 rounded-lg shadow lg:h-[90vh] lg:overflow-y-auto border-t-8 border-blue-900 no-print">
            <div class="flex items-center gap-4 border-b-2 border-blue-900 pb-4 mb-6">
                <img src="https://drive.google.com/thumbnail?id=1MvbeFj62QwwzGHvUCNrmjYqX6IrWTQxN&sz=w200" alt="PUSKA" class="max-h-[50px]">
                <h1 class="text-xl font-black text-blue-900 uppercase">PUSKA Resume</h1>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl border border-blue-200 mb-6 space-y-3 text-xs">
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="font-bold">LEVEL</label><select id="level" class="w-full p-2 border rounded bg-white mt-1"><option>Undergraduate</option><option>Diploma</option><option>Postgraduate</option></select></div>
                    <div><label class="font-bold">YEAR</label><select id="year" class="w-full p-2 border rounded bg-white mt-1"><option>Year 1</option><option>Year 2</option><option>Year 3</option><option>Year 4</option></select></div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-2"><label class="font-bold">FACULTY</label>
                        <select id="faculty" class="w-full p-2 border rounded bg-white mt-1" onchange="runUpdate()">
                            <option>Faculty of Electrical Engineering & Technology</option><option>Faculty of Electronic Engineering & Technology</option><option>Faculty of Chemical Engineering & Technology</option><option>Faculty of Mechanical Engineering & Technology</option><option>Faculty of Civil Engineering & Technology</option><option>Faculty of Business & Communication</option><option>Faculty of Intelligent Computing</option>
                        </select>
                    </div>
                    <div><label class="font-bold text-red-600">CURRENT CGPA</label><input type="text" id="main_cgpa" placeholder="4.00" class="w-full p-2 border-2 border-blue-300 rounded mt-1 font-bold text-center" oninput="runUpdate()"></div>
                </div>
                <div><label class="font-bold">PROGRAM (49 Programs)</label>
                    <select id="prog" class="w-full p-2 border rounded bg-white mt-1 font-semibold text-[10px]" onchange="runUpdate()">
                        <option value="">-- Select Program --</option>
                        <optgroup label="Bachelor Degrees">
                            <option>Bachelor of Microelectronic Engineering</option><option>Bachelor of Computer Engineering</option><option>Bachelor of Biomedical Electronic Engineering</option><option>Bachelor of Electronic Engineering</option><option>Bachelor of Electrical Engineering</option><option>Bachelor of Mechatronic Engineering</option><option>Bachelor of Materials Engineering</option><option>Bachelor of Chemical Engineering</option><option>Bachelor of Polymer Engineering</option><option>Bachelor of Mechanical Engineering</option><option>Bachelor of Manufacturing Engineering</option><option>Bachelor of Agricultural Engineering</option><option>Bachelor of Civil Engineering</option><option>Bachelor of Environmental Engineering</option><option>Bachelor of Technology in Industrial Machining</option><option>Bachelor of Technology in Automotive</option><option>Bachelor of Technology in Welding</option><option>Bachelor of New Media Communication</option><option>Bachelor of Business (International Business)</option><option>Bachelor of Business (Engineering Entrepreneurship)</option><option>Bachelor of Accounting</option><option>Bachelor of Interactive Media Technology</option><option>Bachelor of Data Science (Artificial Intelligence)</option><option>Bachelor of Applied Science (Materials Technology & Metallurgy)</option>
                        </optgroup>
                        <optgroup label="Diploma">
                            <option>Diploma in Computer Engineering</option><option>Diploma in Electronic Engineering</option><option>Diploma in Electrical Engineering</option><option>Diploma in Mechatronic Engineering</option><option>Diploma in Mechanical Engineering Technology</option><option>Diploma in Manufacturing Engineering</option><option>Diploma in Materials Engineering</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-6"><label class="flex items-center justify-center p-2 bg-yellow-50 border rounded-lg cursor-pointer font-bold text-xs"><input type="radio" name="tmpx" value="ats" checked onchange="toggleLayout()" class="mr-2"> ATS Layout</label><label class="flex items-center justify-center p-2 bg-yellow-50 border rounded-lg cursor-pointer font-bold text-xs"><input type="radio" name="tmpx" value="std" onchange="toggleLayout()" class="mr-2"> Photo Layout</label></div>

            <div class="space-y-6">
                <section class="p-4 border rounded-xl bg-white shadow-sm entry">
                    <h3 class="font-bold text-blue-900 uppercase text-xs mb-3">1. Personal Info</h3>
                    <div id="photo-area" class="hidden mb-3 p-2 border rounded"><input type="file" accept="image/*" class="text-xs" onchange="loadPhoto(this)"></div>
                    <input type="text" id="name" placeholder="FULL NAME" class="w-full p-2 border rounded mb-2 font-bold uppercase text-sm" oninput="runUpdate()">
                    <input type="text" id="email" placeholder="email@unimap.edu.my" class="w-full p-2 border rounded mb-2 text-sm" oninput="runUpdate()">
                    <input type="text" id="phone" placeholder="01X-XXXXXXX" class="w-full p-2 border rounded mb-2 text-sm" oninput="runUpdate()">
                    <input type="text" id="address" placeholder="CITY, STATE" class="w-full p-2 border rounded mb-2 text-sm" oninput="runUpdate()">
                    <input type="text" id="linkedin" placeholder="LinkedIn URL" class="w-full p-2 border rounded text-sm" oninput="runUpdate()">
                </section>

                <section class="p-4 border rounded-xl bg-white shadow-sm"><div class="flex justify-between items-center mb-2"><h3 class="font-bold text-xs uppercase">2. Summary</h3><button onclick="askAI('summary')" class="ai-btn">✨ AI Help</button></div><textarea id="summary" placeholder="e.g. Highly motivated final year student..." class="w-full p-2 border rounded h-24 text-sm" oninput="runUpdate()"></textarea></section>

                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm"><div class="flex justify-between items-center mb-2"><b>3. Education</b><button onclick="addEntry('edu-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div><div id="edu-list"><div class="p-3 border bg-white rounded-lg entry mb-2 text-sm"><input type="text" placeholder="Universiti Malaysia Perlis" class="w-full border-b mb-1 font-bold" oninput="runUpdate()"><input type="text" placeholder="Bachelor Degree" class="w-full border-b mb-1" oninput="runUpdate()"><div class="grid grid-cols-2 gap-2 mt-1"><input type="text" placeholder="Start" class="border-b" oninput="runUpdate()"><input type="text" placeholder="End" class="border-b" oninput="runUpdate()"></div></div></div></section>

                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm"><div class="flex justify-between items-center mb-2"><b>5. Projects</b><button onclick="askAI('proj')" class="ai-btn">✨ AI Help</button><button onclick="addEntry('proj-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div><div id="proj-list"><div class="p-3 border bg-white rounded-lg entry mb-2 text-sm"><input type="text" placeholder="Project Name" class="w-full border-b mb-1 font-bold" oninput="runUpdate()"><textarea placeholder="Describe role & outcome..." class="w-full p-1 h-16 border rounded text-xs" oninput="runUpdate()"></textarea></div></div></section>

                <div class="grid grid-cols-2 gap-4">
                    <section class="p-4 border rounded-xl bg-white"><div class="flex justify-between items-center mb-1"><b>6. Tech Skills</b><button onclick="askAI('tech')" class="ai-btn">✨ AI</button></div><textarea id="tech_sk" placeholder="MATLAB, Python..." class="w-full p-2 border rounded text-xs h-20" oninput="runUpdate()"></textarea></section>
                    <section class="p-4 border rounded-xl bg-white"><div class="flex justify-between items-center mb-1"><b>7. Soft Skills</b><button onclick="askAI('soft')" class="ai-btn">✨ AI</button></div><textarea id="soft_sk" placeholder="Leadership, Teamwork..." class="w-full p-2 border rounded text-xs h-20" oninput="runUpdate()"></textarea></section>
                </div>

                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm"><div class="flex justify-between items-center mb-2"><b>10. References</b><button onclick="addEntry('ref-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div><div id="ref-list"><div class="p-3 border bg-white rounded-lg entry mb-2 text-sm">
                    <input type="text" placeholder="Referee Name" class="w-full border-b mb-1 font-bold" oninput="runUpdate()">
                    <div class="grid grid-cols-2 gap-2 mt-1"><input type="text" placeholder="Position" class="border-b" oninput="runUpdate()"><input type="text" placeholder="Organization" class="border-b" oninput="runUpdate()"></div>
                    <div class="grid grid-cols-2 gap-2 mt-1"><input type="text" placeholder="Phone" class="border-b text-xs" oninput="runUpdate()"><input type="text" placeholder="Email" class="border-b text-xs" oninput="runUpdate()"></div>
                </div></div></section>
            </div>

            <div class="mt-8 grid grid-cols-2 gap-3 pb-10">
                <button onclick="location.reload()" class="bg-gray-400 text-white py-3 rounded-xl font-bold uppercase">Reset</button>
                <button onclick="submitDatabase()" id="btnSubmit" class="bg-blue-800 text-white py-3 rounded-xl font-bold shadow-xl">Download & Submit</button>
            </div>
        </div>

        <div class="preview-container">
            <div class="resume-preview" id="pdf-area">
                <header id="pdf-header" class="text-center">
                    <img id="photo-preview" src="" class="hidden" style="width:110px; height:140px; border:1px solid #ddd; object-fit:cover; margin:0 auto 10px;">
                    <div class="w-full">
                        <h1 id="p-name">MUHAMAD ZUL IZZAT BIN JAMIL</h1>
                        <p style="font-size: 11pt; margin: 5px 0;"><span id="p-email">email@example.com</span> | <span id="p-phone">012-3456789</span> | <span id="p-address">LOKASI</span></p>
                        <div id="p-linkedin-area" style="font-size: 10pt;"></div>
                    </div>
                </header>
                <section><h2>Professional Summary</h2><p id="p-summary" class="section-content text-justify"></p></section>
                <section><h2>Education</h2><div id="p-edu"></div></section>
                <section><h2>Key Projects</h2><div id="p-proj"></div></section>
                <div class="grid grid-cols-2 gap-8"><section><h2>Technical Skills</h2><p id="p-tech" class="section-content whitespace-pre-line"></p></section><section><h2>Soft Skills</h2><p id="p-soft" class="section-content whitespace-pre-line"></p></section></div>
                <section><h2>References</h2><div id="p-ref" class="grid grid-cols-2 gap-4"></div></section>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzARfeXIW1_uwtH5kiHNy7Hvu_sFfrNE7HW-PAMa5Cg3aareCYZ-qYJcQDSpOao-84z/exec';

        window.onload = runUpdate;

        function runUpdate() {
            document.getElementById('p-name').innerText = (document.getElementById('name').value || 'YOUR FULL NAME').toUpperCase();
            document.getElementById('p-email').innerText = document.getElementById('email').value || 'email@example.com';
            document.getElementById('p-phone').innerText = document.getElementById('phone').value || '012-3456789';
            document.getElementById('p-address').innerText = (document.getElementById('address').value || 'LOCATION').toUpperCase();
            document.getElementById('p-summary').innerText = document.getElementById('summary').value;
            document.getElementById('p-tech').innerText = document.getElementById('tech_sk').value;
            document.getElementById('p-soft').innerText = document.getElementById('soft_sk').value;
            const li = document.getElementById('linkedin').value;
            document.getElementById('p-linkedin-area').innerHTML = li ? `<a href="${li.startsWith('http')?li:'https://'+li}" target="_blank" style="color:#1e3a8a;font-weight:bold;">${li}</a>` : "";

            fillSection('edu-list', 'p-edu', i => `<div class="mb-3 text-[10.5pt]"><div class="item-header"><span>${i[0].value}</span><span>${i[2].value} - ${i[3].value}</span></div><i>${i[1].value}</i><br>CGPA: ${document.getElementById('main_cgpa').value || '0.00'}</div>`);
            fillList('proj-list', 'p-proj', (i, b) => `<div class="mb-4 text-[10.5pt]"><div class="item-header"><span>${i[0].value}</span></div><ul class="mt-1">${b}</ul></div>`);
            fillSection('ref-list', 'p-ref', i => `<div class="text-[10pt]"><b>${i[0].value}</b><br>${i[1].value}, ${i[2].value}<br>${i[3].value} | ${i[4].value}</div>`);
        }

        async function submitDatabase() {
            const btn = document.getElementById('btnSubmit'); btn.innerText = "Processing..."; btn.disabled = true;
            const isStd = document.getElementById('pdf-area').classList.contains('template-standard');
            const fullHtml = `<html><head><style>${document.getElementById('resume-styles').innerHTML}</style></head><body><div class="resume-preview ${isStd?'template-standard':''}">${document.getElementById('pdf-area').innerHTML}</div></body></html>`;

            const payload = {
                cgpa: document.getElementById('main_cgpa').value,
                name: document.getElementById('name').value, email: document.getElementById('email').value,
                phone: document.getElementById('phone').value, level: document.getElementById('level').value,
                year: document.getElementById('year').value, program: document.getElementById('prog').value,
                faculty: document.getElementById('faculty').value, templateType: document.querySelector('input[name="tmpx"]:checked').value,
                htmlForPdf: fullHtml
            };

            try {
                window.print();
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ Success! Resume saved.");
            } catch(e) { window.print(); } finally { btn.disabled = false; btn.innerText = "Download & Submit"; }
        }

        function fillSection(id, out, tmpl) { let h = ''; document.querySelectorAll(`#${id} .entry`).forEach(el => { const i = el.querySelectorAll('input'); if(i[0].value) h += tmpl(i); }); document.getElementById(out).innerHTML = h; }
        function fillList(id, out, tmpl) { let h = ''; document.querySelectorAll(`#${id} .entry`).forEach(el => { const i = el.querySelectorAll('input'); const t = el.querySelector('textarea').value; if(i[0].value) { const b = t.split('\n').filter(l => l.trim()).map(l => `<li>${l}</li>`).join(''); h += tmpl(i, b); } }); document.getElementById(out).innerHTML = h; }
        function addEntry(id) { const container = document.getElementById(id); const clone = container.children[0].cloneNode(true); clone.querySelectorAll('input, textarea').forEach(v => v.value = ''); container.appendChild(clone); runUpdate(); }
        function toggleLayout() { document.getElementById('pdf-area').classList.toggle('template-standard', document.querySelector('input[name="tmpx"]:checked').value === 'std'); document.getElementById('photo-area').classList.toggle('hidden', document.querySelector('input[name="tmpx"]:checked').value === 'ats'); runUpdate(); }
        function loadPhoto(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('photo-preview').src = e.target.result; document.getElementById('photo-preview').classList.remove('hidden'); }; r.readAsDataURL(i.files[0]); } }
        function askAI(t) { let p = `Provide a resume ${t} for a ${document.getElementById('prog').value || 'University'} student.`; navigator.clipboard.writeText(p).then(() => alert("AI Prompt Copied!")); }
    </script>
</body>
</html>
