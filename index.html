<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSKA Resume System v40.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="resume-styles">
        /* --- CORE PDF SETTINGS (FIX SIZE) --- */
        @page {
            size: A4;
            margin: 0; /* Buang margin browser */
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        
        body { margin: 0; padding: 0; background: #f3f4f6; }

        #pdf-area {
            font-family: 'Arial', sans-serif; 
            color: #1a1a1a; 
            line-height: 1.4; 
            background: white;
            width: 210mm; /* Paksa saiz A4 */
            min-height: 297mm;
            padding: 20mm; /* Margin dalaman resume */
            margin: 20px auto; /* Margin luar untuk view sahaja */
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* TYPOGRAPHY */
        #pdf-area h1 { font-size: 22pt; font-weight: bold; text-transform: uppercase; margin: 0 0 5px 0; text-align: center; }
        #pdf-area h2 { border-bottom: 2px solid #333; margin-top: 15px; margin-bottom: 8px; font-size: 13pt; font-weight: bold; text-transform: uppercase; text-align: left; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; margin-top: 4px; }
        #pdf-area ul { list-style-type: disc; margin-left: 18px; padding: 0; }
        #pdf-area li { font-size: 10.5pt; margin-bottom: 2px; }
        .section-content { font-size: 10.5pt; margin-bottom: 8px; }

        /* PHOTO LAYOUT */
        .template-photo header { border-bottom: 4px solid #1e3a8a; padding-bottom: 15px; text-align: left !important; display: flex !important; align-items: center; gap: 20px; margin-bottom: 15px; }
        .template-photo #photo-preview { width: 35mm; height: 45mm; border: 1px solid #ddd; object-fit: cover; display: block !important; }
        .template-photo h2 { background: #1e3a8a !important; color: white !important; border: none !important; padding: 6px 12px !important; }

        /* FORM UI (SIDEBAR) */
        .no-print { width: 100%; max-width: 600px; padding: 30px; background: white; border-right: 1px solid #ddd; }
        input, select, textarea { font-size: 13px !important; padding: 10px !important; border: 1px solid #d1d5db !important; border-radius: 8px !important; width: 100%; margin-top: 4px; }
        label { font-size: 11px; font-weight: 800; color: #4b5563; text-transform: uppercase; margin-top: 10px; display: block; }
        
        #ai-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; }

        /* PRINT PREVIEW ADJUSTMENT */
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            #pdf-area { 
                margin: 0 !important; 
                border: none !important; 
                box-shadow: none !important;
                width: 210mm !important; 
                height: 297mm !important;
            }
        }

        @media (max-width: 1024px) {
            .preview-container { overflow-x: auto; padding: 20px; }
            #pdf-area { transform: scale(0.4); transform-origin: top center; }
        }
    </style>
</head>
<body>

    <div id="ai-modal">
        <div class="modal-content text-center">
            <h3 class="font-black text-lg text-purple-700 uppercase mb-4">✨ AI Prompt Generator</h3>
            <div id="prompt-text" class="p-4 bg-gray-50 border rounded-xl text-sm italic mb-6 text-left text-gray-700"></div>
            <div class="flex gap-2">
                <button onclick="copyAndClose()" class="flex-1 bg-purple-600 text-white font-bold py-3 rounded-xl">SALIN & TUTUP</button>
                <button onclick="closeModal()" class="px-6 bg-gray-200 rounded-xl font-bold">BATAL</button>
            </div>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row h-screen overflow-hidden">
        <div class="no-print overflow-y-auto">
            <h1 class="text-2xl font-black text-blue-900 mb-6 uppercase">PUSKA v40.0</h1>

            <div class="bg-blue-900 p-5 rounded-xl text-white mb-8 shadow-lg">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-blue-200">LEVEL</label><select id="level" class="text-black"><option>Undergraduate</option><option>Diploma</option></select></div>
                    <div><label class="text-blue-200">YEAR</label><select id="year" class="text-black"><option>Year 4</option><option>Year 3</option></select></div>
                </div>
                <div><label class="text-blue-200">PROGRAM</label>
                    <select id="prog" class="text-black font-semibold text-[11px]" onchange="runUpdate()">
                        <option selected>SARJANA MUDA SAINS DATA (KECERDASAN BUATAN)</option>
                        <option>SARJANA MUDA KEJURUTERAAN ELEKTRIK</option>
                    </select>
                </div>
                <div><label class="text-yellow-300">CGPA</label><input type="text" id="main_cgpa" placeholder="4.00" class="text-black text-center font-bold" oninput="runUpdate()"></div>
            </div>

            <section class="space-y-6">
                <div class="p-5 border rounded-xl bg-gray-50 shadow-sm">
                    <b class="text-blue-900 text-xs block border-b pb-2 mb-4 uppercase">Layout & Photo</b>
                    <div class="flex gap-2 mb-4">
                        <label class="flex-1 border p-2 rounded bg-white text-center cursor-pointer"><input type="radio" name="resType" value="ATS" checked onchange="toggleLayout()"> ATS</label>
                        <label class="flex-1 border p-2 rounded bg-white text-center cursor-pointer"><input type="radio" name="resType" value="Photo" onchange="toggleLayout()"> PHOTO</label>
                    </div>
                    <div id="photo-input-area" class="hidden"><input type="file" accept="image/*" onchange="loadPhoto(this)"></div>
                </div>

                <div class="p-5 border rounded-xl bg-white shadow-sm">
                    <label>Full Name</label><input type="text" id="fullName" placeholder="NAMA PENUH" class="font-bold uppercase" oninput="runUpdate()">
                    <label>Email</label><input type="text" id="email" placeholder="email@gmail.com" oninput="runUpdate()">
                    <label>Phone</label><input type="text" id="phone" placeholder="01X-XXXXXXX" oninput="runUpdate()">
                    <label>Location</label><input type="text" id="address" placeholder="ARAU, PERLIS" oninput="runUpdate()">
                    <label>LinkedIn</label><input type="text" id="linkedin" oninput="runUpdate()">
                </div>

                <div class="p-5 border rounded-xl bg-white shadow-sm">
                    <div class="flex justify-between items-center"><label>Professional Summary</label><button onclick="openAI('summary')" class="text-[9px] bg-purple-600 text-white px-2 py-1 rounded">✨ AI HELP</button></div>
                    <textarea id="summary" class="h-24" oninput="runUpdate()"></textarea>
                </div>
                
                <div class="p-5 border rounded-xl bg-white shadow-sm">
                    <div class="flex justify-between items-center"><label>Experience / Skills / References</label></div>
                    <p class="text-[10px] text-gray-400 mt-1 italic">Sila tambah seksyen lain mengikut keperluan...</p>
                    <textarea id="tech_sk" placeholder="Technical Skills" class="mt-2" oninput="runUpdate()"></textarea>
                    <textarea id="soft_sk" placeholder="Soft Skills" class="mt-2" oninput="runUpdate()"></textarea>
                </div>
            </section>

            <div class="mt-10 grid grid-cols-2 gap-4 pb-20">
                <button onclick="location.reload()" class="bg-gray-400 text-white py-4 rounded-xl font-bold">RESET</button>
                <button onclick="submitDatabase()" id="btnSubmit" class="bg-blue-800 text-white py-4 rounded-xl font-bold shadow-lg">SAVE & DOWNLOAD</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto preview-container">
            <div id="pdf-area">
                <header class="text-center">
                    <img id="photo-preview" src="" class="hidden" style="margin: 0 auto 15px auto;">
                    <h1 id="p-name">MUHAMAD ZUL IZZAT BIN JAMIL</h1>
                    <p id="p-contact" style="font-size: 11pt; margin: 8px 0; font-weight: bold; color: #333;">email@gmail.com  •  01X-XXXXXXX  •  ARAU, PERLIS</p>
                    <div id="p-linkedin" style="font-size: 10pt; color: #1e3a8a; font-weight: bold;"></div>
                </header>

                <section><h2>Professional Summary</h2><p id="p-summary" class="section-content text-justify"></p></section>
                <section><h2>Education</h2><div id="p-edu"></div></section>
                <div class="grid grid-cols-2 gap-8">
                    <section><h2>Technical Skills</h2><p id="p-tech" class="section-content whitespace-pre-line"></p></section>
                    <section><h2>Soft Skills</h2><p id="p-soft" class="section-content whitespace-pre-line"></p></section>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxz9VcCHwxozEolxrezxPHV8SdeXD9-8qnRxYymE_5ddROPHzhiBF25jWS5j-06-MGMHw/exec";

        function runUpdate() {
            document.getElementById('p-name').innerText = (document.getElementById('fullName').value || 'MUHAMAD ZUL IZZAT BIN JAMIL').toUpperCase();
            const email = document.getElementById('email').value || 'email@gmail.com';
            const phone = document.getElementById('phone').value || '01X-XXXXXXX';
            const loc = (document.getElementById('address').value || 'ARAU, PERLIS').toUpperCase();
            document.getElementById('p-contact').innerText = `${email}  •  ${phone}  •  ${loc}`;
            document.getElementById('p-linkedin').innerText = document.getElementById('linkedin').value || '';
            document.getElementById('p-summary').innerText = document.getElementById('summary').value;
            document.getElementById('p-tech').innerText = document.getElementById('tech_sk').value;
            document.getElementById('p-soft').innerText = document.getElementById('soft_sk').value;
            
            document.getElementById('p-edu').innerHTML = `<div class="item-header"><span>UNIVERSITI MALAYSIA PERLIS</span><span>2022 - 2026</span></div><i>${document.getElementById('prog').value}</i><br><b>CGPA: ${document.getElementById('main_cgpa').value}</b>`;
        }

        async function submitDatabase() {
            const btn = document.getElementById('btnSubmit');
            const resType = document.querySelector('input[name="resType"]:checked').value;
            btn.innerText = "Processing..."; btn.disabled = true;

            const previewArea = document.getElementById('pdf-area');
            const previewClone = previewArea.cloneNode(true);
            if(resType === "ATS") {
                const img = previewClone.querySelector('#photo-preview');
                if(img) img.remove();
                previewClone.querySelector('header').style.textAlign = "center";
            }

            const resumeStyles = document.getElementById('resume-styles').innerHTML;
            const fullHtml = `<!DOCTYPE html><html><head><style>${resumeStyles} body { background: white; } #pdf-area { margin: 0; border: none; box-shadow: none; }</style></head><body>${previewClone.outerHTML}</body></html>`;

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ fullName: document.getElementById('fullName').value, resumeType: resType, htmlContent: fullHtml }) });
                alert("Success!");
                const win = window.open('', '_blank');
                win.document.write(fullHtml);
                win.document.close();
                // Paksa print preview dengan saiz A4
                win.setTimeout(() => { win.print(); win.close(); }, 500);
            } catch (e) { alert("Error!"); } finally { btn.disabled = false; btn.innerText = "SAVE & DOWNLOAD"; }
        }

        function toggleLayout() {
            const type = document.querySelector('input[name="resType"]:checked').value;
            const preview = document.getElementById('pdf-area');
            const img = document.getElementById('photo-preview');
            preview.className = (type === 'Photo') ? 'template-photo' : '';
            document.getElementById('photo-input-area').classList.toggle('hidden', type === 'ATS');
            if(type === 'ATS') img.classList.add('hidden');
            else if(img.src.startsWith('data')) img.classList.remove('hidden');
            runUpdate();
        }

        function loadPhoto(i) {
            if(i.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    const img = document.getElementById('photo-preview');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function openAI(t) {
            document.getElementById('prompt-text').innerText = `Tolong tuliskan resume summary profesional untuk pelajar sains data...`;
            document.getElementById('ai-modal').style.display = 'block';
        }
        function closeModal() { document.getElementById('ai-modal').style.display = 'none'; }
        function copyAndClose() { navigator.clipboard.writeText(document.getElementById('prompt-text').innerText); closeModal(); }
        
        window.onload = runUpdate;
    </script>
</body>
</html>
