<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSKA Resume Generator v5.3 OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="resume-styles">
        /* CSS PAPARAN DALAM SISTEM */
        .resume-preview {
            font-family: 'Arial', sans-serif; color: #1a1a1a; line-height: 1.4; background: white;
            min-height: 297mm; width: 100%; padding: 15mm; box-sizing: border-box; border: 1px solid #ddd;
        }
        .resume-preview h1 { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin: 0; color: black; }
        .resume-preview h2 { border-bottom: 2px solid #333; margin-top: 12px; margin-bottom: 5px; font-size: 13pt; font-weight: bold; text-transform: uppercase; text-align: left; color: black; }
        .template-standard header { display: flex !important; align-items: center !important; gap: 20px !important; border-bottom: 3px solid #1e3a8a !important; padding-bottom: 15px; text-align: left !important; }
        .template-standard #photo-preview { width: 110px; height: 140px; border: 1px solid #ddd; object-fit: cover; display: block !important; }
        .template-standard h2 { background: #1e3a8a !important; color: white !important; border: none !important; padding: 5px 10px !important; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; }
        .resume-preview ul { list-style-type: disc !important; margin-left: 1.2rem !important; }
        .section-content { font-size: 10.5pt; margin-bottom: 8px; }
        .ai-btn { background: linear-gradient(45deg, #1e3a8a, #3b82f6); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; border: none; }
        .no-print { display: block; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6 no-print">
        
        <div class="bg-white p-6 rounded-lg shadow h-[90vh] overflow-y-auto border-t-8 border-blue-900">
            <div class="flex items-center gap-4 border-b-2 border-blue-900 pb-4 mb-6">
                <img src="https://drive.google.com/thumbnail?id=1MvbeFj62QwwzGHvUCNrmjYqX6IrWTQxN&sz=w200" alt="PUSKA" class="max-h-[60px]">
                <div>
                    <h1 class="text-2xl font-black text-blue-900 leading-none">PUSKA</h1>
                    <p class="text-sm font-bold text-gray-600 tracking-widest uppercase">RESUME GENERATOR v5.3</p>
                </div>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl border border-blue-200 mb-6 space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="font-bold text-blue-900 text-[10px] uppercase">Level</label>
                        <select id="level" class="w-full p-2 border rounded bg-white" onchange="runUpdate()"><option value="Undergraduate">Undergraduate</option><option value="Diploma">Diploma</option><option value="Postgraduate">Postgraduate</option></select>
                    </div>
                    <div><label class="font-bold text-blue-900 text-[10px] uppercase">Year</label>
                        <select id="year" class="w-full p-2 border rounded bg-white" onchange="runUpdate()"><option value="Year 1">Year 1</option><option value="Year 2">Year 2</option><option value="Year 3">Year 3</option><option value="Year 4">Year 4</option></select>
                    </div>
                </div>
                <div><label class="text-[10px] font-bold text-blue-900 uppercase">Fakulti</label>
                    <select id="faculty" class="w-full p-2 border rounded bg-white text-sm" onchange="runUpdate()">
                        <option value="Fakulti Kejuruteraan & Teknologi Elektrik">Fakulti Kejuruteraan & Teknologi Elektrik</option>
                        <option value="Fakulti Kejuruteraan & Teknologi Elektronik">Fakulti Kejuruteraan & Teknologi Elektronik</option>
                        <option value="Fakulti Kejuruteraan & Teknologi Kimia">Fakulti Kejuruteraan & Teknologi Kimia</option>
                        <option value="Fakulti Kejuruteraan & Teknologi Mekanikal">Fakulti Kejuruteraan & Teknologi Mekanikal</option>
                        <option value="Fakulti Kejuruteraan & Teknologi Awam">Fakulti Kejuruteraan & Teknologi Awam</option>
                        <option value="Fakulti Komputeran Cerdas">Fakulti Komputeran Cerdas</option>
                        <option value="Fakulti Perniagaan & Komunikasi">Fakulti Perniagaan & Komunikasi</option>
                    </select>
                </div>
                <div><label class="text-[10px] font-bold text-blue-900 uppercase">Nama Program</label>
                    <select id="prog" class="w-full p-2 border rounded bg-white text-sm font-semibold" onchange="runUpdate()">
                        <option value="">-- Sila Pilih Program --</option>
                        <option value="Sarjana Muda Kejuruteraan Mikroelektronik">Sarjana Muda Kejuruteraan Mikroelektronik</option>
                        <option value="Sarjana Muda Kejuruteraan Komputer">Sarjana Muda Kejuruteraan Komputer</option>
                        <option value="Sarjana Muda Perakaunan">Sarjana Muda Perakaunan</option>
                        </select>
                </div>
            </div>

            <div class="bg-yellow-50 p-3 rounded-lg border border-yellow-200 mb-6 flex justify-around">
                <label class="flex items-center gap-2 cursor-pointer font-bold text-sm"><input type="radio" name="tmpx" value="ats" checked onchange="toggleLayout()"> ATS Layout</label>
                <label class="flex items-center gap-2 cursor-pointer font-bold text-sm"><input type="radio" name="tmpx" value="std" onchange="toggleLayout()"> Photo Layout</label>
            </div>

            <div class="space-y-6">
                <section class="p-4 border rounded-xl bg-white shadow-sm entry">
                    <h3 class="font-bold border-b-2 border-blue-500 mb-3 text-blue-900 uppercase text-xs">1. Personal Info</h3>
                    <div id="photo-area" class="hidden mb-3 p-2 bg-gray-50 border rounded text-center"><input type="file" accept="image/*" class="text-xs" onchange="loadPhoto(this)"></div>
                    <input type="text" id="name" placeholder="Full Name" class="w-full p-2 border rounded mb-2 font-bold uppercase" oninput="runUpdate()">
                    <input type="text" id="email" placeholder="Email Address" class="w-full p-2 border rounded mb-2" oninput="runUpdate()">
                    <input type="text" id="phone" placeholder="Phone Number" class="w-full p-2 border rounded mb-2" oninput="runUpdate()">
                    <input type="text" id="address" placeholder="Address" class="w-full p-2 border rounded mb-2" oninput="runUpdate()">
                </section>
                <section class="p-4 border rounded-xl bg-white shadow-sm">
                    <div class="flex justify-between items-center mb-2"><h3 class="font-bold border-b-2 border-blue-500 text-blue-900 uppercase text-xs">2. Summary</h3><button onclick="askAI('summary')" class="ai-btn">✨ AI HELP</button></div>
                    <textarea id="summary" placeholder="Summary..." class="w-full p-2 border rounded h-24 text-sm" oninput="runUpdate()"></textarea>
                </section>
                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm">
                    <div class="flex justify-between items-center mb-2"><h3 class="font-bold uppercase text-xs">3. Education</h3><button onclick="addEntry('edu-list')" class="bg-blue-600 text-white px-3 rounded-full shadow">+</button></div>
                    <div id="edu-list"><div class="p-3 border bg-white rounded-lg entry mb-2"><input type="text" placeholder="Institution" class="w-full border-b mb-1 p-1 font-bold text-sm" oninput="runUpdate()"><input type="text" placeholder="Degree" class="w-full border-b mb-1 p-1 text-sm" oninput="runUpdate()"><input type="text" placeholder="Date" class="w-full border-b mb-1 p-1 text-sm" oninput="runUpdate()"><input type="text" placeholder="CGPA" class="border rounded p-1 text-xs" oninput="runUpdate()"></div></div>
                </section>
            </div>

            <div class="mt-8 flex gap-2">
                <button onclick="resetAll()" class="w-1/3 bg-gray-400 text-white py-4 rounded-xl font-bold uppercase text-sm">Reset</button>
                <button onclick="submitDatabase()" id="btnSubmit" class="w-2/3 bg-blue-800 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-sm shadow-xl">Download & Submit</button>
            </div>
        </div>

        <div class="bg-gray-200 flex justify-center overflow-y-auto no-print">
            <div class="bg-white resume-preview" id="pdf-area">
                <header id="pdf-header" style="text-align: center;">
                    <img id="photo-preview" src="" class="hidden">
                    <div class="w-full">
                        <h1 id="p-name">YOUR FULL NAME</h1>
                        <p style="font-size: 11pt; margin: 5px 0;"><span id="p-email">email@example.com</span> | <span id="p-phone">012-3456789</span> | <span id="p-address">Address</span></p>
                    </div>
                </header>
                <section><h2>Professional Summary</h2><p id="p-summary" class="section-content text-justify"></p></section>
                <section><h2>Education</h2><div id="p-edu" class="section-content"></div></section>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzCXU3LLPd0tZsDMBVLXXOmXzYofCu6Hjg-82hPWKNNnVJKIgZDWEa7frwuyEmGNJ8OHQ/exec';

        window.onload = () => { loadDraft(); runUpdate(); };

        function toggleLayout() {
            const isStd = document.querySelector('input[name="tmpx"]:checked').value === 'std';
            const pdf = document.getElementById('pdf-area');
            const head = document.getElementById('pdf-header');
            if(isStd) { pdf.classList.add('template-standard'); document.getElementById('photo-area').classList.remove('hidden'); head.style.textAlign = "left"; }
            else { pdf.classList.remove('template-standard'); document.getElementById('photo-area').classList.add('hidden'); head.style.textAlign = "center"; }
            runUpdate();
        }

        function loadPhoto(input) { if(input.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('photo-preview').src = e.target.result; document.getElementById('photo-preview').classList.remove('hidden'); }; r.readAsDataURL(input.files[0]); } }

        function runUpdate() {
            document.getElementById('p-name').innerText = (document.getElementById('name').value || 'YOUR FULL NAME').toUpperCase();
            document.getElementById('p-email').innerText = document.getElementById('email').value || 'email@example.com';
            document.getElementById('p-phone').innerText = document.getElementById('phone').value || '012-3456789';
            document.getElementById('p-address').innerText = document.getElementById('address').value || 'Address';
            document.getElementById('p-summary').innerText = document.getElementById('summary').value;

            fillSection('edu-list', 'p-edu', i => `<div class="mb-3 text-[10.5pt]"><div class="item-header"><span>${i[0].value}</span><span>${i[2].value}</span></div><i>${i[1].value}</i><br>CGPA: ${i[3].value}</div>`);
            saveDraft();
        }

        function fillSection(id, out, tmpl) { let h = ''; document.querySelectorAll(`#${id} .entry`).forEach(el => { const i = el.querySelectorAll('input'); if(i[0].value) h += tmpl(i); }); document.getElementById(out).innerHTML = h; }
        function addEntry(id) { const container = document.getElementById(id); const clone = container.children[0].cloneNode(true); clone.querySelectorAll('input, textarea').forEach(v => v.value = ''); container.appendChild(clone); runUpdate(); }

        function askAI(type) {
            let p = "Write 5 professional bullet points for resume summary.";
            navigator.clipboard.writeText(p).then(() => alert("Prompt copied!"));
        }

        function saveDraft() {
            const data = { n: document.getElementById('name').value, e: document.getElementById('email').value };
            localStorage.setItem('puska_v5_3', JSON.stringify(data));
        }

        function loadDraft() {
            const d = JSON.parse(localStorage.getItem('puska_v5_3'));
            if(d) { document.getElementById('name').value = d.n; document.getElementById('email').value = d.e; }
        }

        function resetAll() { localStorage.removeItem('puska_v5_3'); location.reload(); }

        // FUNGSI PRINT KHAS (TEKNIK POPUP STABIL)
        function printResume() {
            const printContent = document.getElementById('pdf-area').innerHTML;
            const css = document.getElementById('resume-styles').innerHTML;
            const layoutClass = document.getElementById('pdf-area').className;
            
            const printWindow = window.open('', '', 'width=900,height=1000');
            printWindow.document.write(`
                <html>
                <head>
                    <title>PUSKA Resume</title>
                    <style>${css}</style>
                    <style>
                        body { background: white; padding: 0; margin: 0; }
                        .resume-preview { width: 210mm; min-height: 297mm; border:none; margin: auto; }
                    </style>
                </head>
                <body onload="window.print(); window.close();">
                    <div class="${layoutClass}">${printContent}</div>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        async function submitDatabase() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            if(!name || !email) { alert("Isi Nama & Email."); return; }
            
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "Submitting..."; btn.disabled = true;

            const layoutType = document.querySelector('input[name="tmpx"]:checked').value === 'std' ? "Photo Layout" : "ATS Layout";
            const payload = {
                level: document.getElementById('level').value, year: document.getElementById('year').value, name: name, email: email,
                templateType: layoutType, htmlForPdf: document.getElementById('pdf-area').innerHTML
            };

            try { 
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }); 
                alert("✅ Data Saved! Opening printer...");
                printResume(); // Panggil fungsi print baru
            } catch(e) { 
                printResume(); 
            } finally {
                btn.disabled = false; btn.innerText = "Download & Submit";
            }
        }
    </script>
</body>
</html>
