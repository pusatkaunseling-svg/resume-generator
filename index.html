<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSKA Resume Generator - Master v19.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="resume-styles">
        /* --- PAPARAN SKRIN (BROWSER VIEW) --- */
        .resume-preview {
            font-family: 'Arial', sans-serif; color: #1a1a1a; line-height: 1.4; background: white;
            width: 210mm; min-height: 297mm; padding: 20mm; box-sizing: border-box; 
            border: 1px solid #ddd; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .resume-preview h1 { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin: 0; color: black; text-align: center; }
        .resume-preview h2 { border-bottom: 2px solid #333; margin-top: 15px; margin-bottom: 8px; font-size: 12pt; font-weight: bold; text-transform: uppercase; text-align: left; color: black; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; }
        .resume-preview ul { list-style-type: disc !important; margin-left: 1.2rem !important; margin-top: 2px; }
        .section-content { font-size: 10.5pt; margin-bottom: 8px; }

        /* Style untuk Template Photo (Warna Biru) */
        .template-standard header { border-bottom: 3px solid #1e3a8a !important; padding-bottom: 15px; text-align: left !important; }
        .template-standard h2 { background: #1e3a8a !important; color: white !important; border: none !important; padding: 5px 10px !important; }

        .ai-btn { background: #1e3a8a; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; border: none; }

        @media (max-width: 1024px) {
            .preview-container { overflow-x: auto; background: #eee; padding: 10px; }
            .resume-preview { transform: scale(0.45); transform-origin: top center; }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-full mx-auto grid grid-cols-1 lg:grid-cols-2 gap-0 no-print">
        
        <div class="bg-white p-6 lg:h-screen lg:overflow-y-auto border-r shadow-inner no-print">
            <div class="flex items-center gap-4 mb-6">
                <img src="https://drive.google.com/thumbnail?id=1MvbeFj62QwwzGHvUCNrmjYqX6IrWTQxN&sz=w200" alt="PUSKA" class="max-h-12">
                <h1 class="text-2xl font-black text-blue-900 uppercase">PUSKA v19.0</h1>
            </div>

            <div class="bg-blue-900 p-4 rounded-xl mb-6 text-white space-y-3">
                <div class="grid grid-cols-2 gap-3 text-xs">
                    <div><label class="font-bold">Level</label><select id="level" class="w-full p-2 rounded bg-white text-black mt-1"><option>Undergraduate</option><option>Diploma</option></select></div>
                    <div><label class="font-bold">Year</label><select id="year" class="w-full p-2 rounded bg-white text-black mt-1"><option>Year 4</option></select></div>
                </div>
                <div class="grid grid-cols-3 gap-3 text-xs">
                    <div class="col-span-2"><label class="font-bold">Faculty</label><select id="faculty" class="w-full p-2 rounded bg-white text-black mt-1"><option>Faculty of Intelligent Computing</option></select></div>
                    <div><label class="font-bold text-yellow-400">CGPA</label><input type="text" id="main_cgpa" value="4.00" class="w-full p-2 rounded bg-white text-black mt-1 font-bold text-center" oninput="runUpdate()"></div>
                </div>
                <div><label class="font-bold">Program (49 Programs)</label>
                    <select id="prog" class="w-full p-2 rounded bg-white text-black mt-1 font-semibold text-[10px]" onchange="runUpdate()">
                        <option value="Bachelor of Data Science (Artificial Intelligence)">Bachelor of Data Science (Artificial Intelligence)</option>
                        <option value="Bachelor of Electrical Engineering">Bachelor of Electrical Engineering</option>
                        </select>
                </div>
            </div>

            <div class="space-y-5">
                <section class="p-4 border rounded-xl bg-white shadow-sm">
                    <h3 class="font-bold text-blue-900 uppercase text-xs mb-3 border-b pb-1">1. Personal Info</h3>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <label class="p-1 border rounded text-center text-[10px] font-bold"><input type="radio" name="tmpx" value="ats" checked onchange="toggleLayout()"> ATS</label>
                        <label class="p-1 border rounded text-center text-[10px] font-bold"><input type="radio" name="tmpx" value="std" onchange="toggleLayout()"> PHOTO</label>
                    </div>
                    <div id="photo-area" class="hidden mb-2"><input type="file" accept="image/*" class="text-xs" onchange="loadPhoto(this)"></div>
                    <input type="text" id="name" placeholder="MUHAMAD ZUL IZZAT BIN JAMIL" class="w-full p-2 border rounded mb-2 font-bold uppercase text-sm" oninput="runUpdate()">
                    <input type="text" id="email" placeholder="zulizzat@unimap.edu.my" class="w-full p-2 border rounded mb-2 text-sm" oninput="runUpdate()">
                    <input type="text" id="phone" placeholder="0135828069" class="w-full p-2 border rounded mb-2 text-sm" oninput="runUpdate()">
                    <input type="text" id="address" placeholder="PASIR GUDANG, JOHOR" class="w-full p-2 border rounded mb-2 text-sm uppercase" oninput="runUpdate()">
                    <input type="text" id="linkedin" placeholder="LinkedIn URL" class="w-full p-2 border rounded text-sm" oninput="runUpdate()">
                </section>

                <section class="p-4 border rounded-xl bg-white shadow-sm">
                    <div class="flex justify-between items-center mb-2"><b>2. Summary</b><button onclick="askAI('summary')" class="ai-btn">✨ AI</button></div>
                    <textarea id="summary" class="w-full p-2 border rounded h-28 text-xs" oninput="runUpdate()">Final-year Bachelor of Data Science (Artificial Intelligence) student with a strong foundation in machine learning, data analysis, and statistical modeling.</textarea>
                </section>

                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm"><div class="flex justify-between items-center mb-2"><b>3. Work Experience</b><button onclick="addEntry('work-list')" class="bg-blue-600 text-white px-2 rounded font-bold">+</button></div><div id="work-list"><div class="p-3 border bg-white rounded-lg entry mb-2 text-xs"><input type="text" placeholder="Job Title" value="Data Science Intern" class="w-full border-b mb-1 font-bold" oninput="runUpdate()"><input type="text" placeholder="Company, Location" value="Deloitte, Penang" class="w-full border-b mb-1" oninput="runUpdate()"><input type="text" placeholder="Date" value="Jun 2025 - Sep 2025" class="w-full border-b mb-1" oninput="runUpdate()"><textarea placeholder="Responsibilities (one per line)..." class="w-full p-1 h-20 border rounded mt-1" oninput="runUpdate()">Developed and implemented machine learning models improving accuracy by 15%</textarea></div></div></section>

                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm"><div class="flex justify-between items-center mb-2"><b>4. Key Projects</b><button onclick="addEntry('proj-list')" class="bg-blue-600 text-white px-2 rounded font-bold">+</button></div><div id="proj-list"><div class="p-3 border bg-white rounded-lg entry mb-2 text-xs"><input type="text" placeholder="Project Name" value="Customer Churn Prediction" class="w-full border-b mb-1 font-bold" oninput="runUpdate()"><textarea placeholder="Details..." class="w-full p-1 h-20 border rounded mt-1" oninput="runUpdate()">Implemented Random Forest algorithm achieving 85% accuracy</textarea></div></div></section>

                <div class="grid grid-cols-2 gap-3"><section class="p-3 border rounded-xl bg-white shadow-sm"><b>5. Tech Skills</b><textarea id="tech_sk" placeholder="Python, SQL..." class="w-full p-2 border rounded h-24 text-[10px]" oninput="runUpdate()">Python (Pandas, NumPy), Power BI, SQL</textarea></section><section class="p-3 border rounded-xl bg-white shadow-sm"><b>6. Soft Skills</b><textarea id="soft_sk" placeholder="Leadership..." class="w-full p-2 border rounded h-24 text-[10px]" oninput="runUpdate()">Analytical Thinking, Problem-Solving</textarea></section></div>

                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm"><div class="flex justify-between items-center mb-2"><b>7. References</b><button onclick="addEntry('ref-list')" class="bg-blue-600 text-white px-2 rounded font-bold">+</button></div><div id="ref-list"><div class="p-3 border bg-white rounded-lg entry mb-2 text-xs"><input type="text" placeholder="Name" value="Ms. Siti Nurhaliza" class="w-full border-b mb-1 font-bold" oninput="runUpdate()"><input type="text" placeholder="Contact" value="P: +60 3-1234 5678 | E: siti.nurhaliza@deloitte.com" class="w-full border-b" oninput="runUpdate()"></div></div></section>
            </div>

            <div class="mt-10 grid grid-cols-2 gap-4 pb-20">
                <button onclick="location.reload()" class="bg-gray-400 text-white py-4 rounded-xl font-bold uppercase shadow">Reset</button>
                <button onclick="submitDatabase()" id="btnSubmit" class="bg-blue-800 text-white py-4 rounded-xl font-bold uppercase shadow-xl hover:scale-105 transition-all">Download & Submit</button>
            </div>
        </div>

        <div class="bg-gray-200 p-0 flex justify-center preview-container lg:h-screen lg:overflow-y-auto no-print">
            <div class="bg-white resume-preview shadow-2xl" id="pdf-area">
                <header id="p-header" class="text-center">
                    <img id="photo-preview" src="" class="hidden" style="width:110px; height:140px; border:1px solid #ddd; object-fit:cover; margin:0 auto 10px;">
                    <h1 id="p-name">MUHAMAD ZUL IZZAT BIN JAMIL</h1>
                    <p id="p-contact" style="font-size: 11pt; margin: 5px 0; font-weight: bold;">zulizzat@unimap.edu.my | 0135828069</p>
                    <div id="p-linkedin-area" style="font-size: 10pt;"></div>
                    <p id="p-location" style="font-size: 10.5pt; font-weight: bold; text-transform: uppercase; border-top: 1px solid #eee; padding-top: 5px;"></p>
                </header>

                <section><h2>Professional Summary</h2><p id="p-summary" class="section-content text-justify"></p></section>
                <section><h2>Education</h2><div id="p-edu"></div></section>
                <section><h2>Work Experience</h2><div id="p-work"></div></section>
                <section><h2>Key Projects</h2><div id="p-proj"></div></section>
                <div class="grid grid-cols-2 gap-8"><section><h2>Technical Skills</h2><p id="p-tech" class="section-content whitespace-pre-line"></p></section><section><h2>Soft Skills</h2><p id="p-soft" class="section-content whitespace-pre-line"></p></section></div>
                <section><h2>References</h2><div id="p-ref"></div></section>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzARfeXIW1_uwtH5kiHNy7Hvu_sFfrNE7HW-PAMa5Cg3aareCYZ-qYJcQDSpOao-84z/exec';

        window.onload = runUpdate;

        function runUpdate() {
            document.getElementById('p-name').innerText = (document.getElementById('name').value || 'YOUR NAME').toUpperCase();
            document.getElementById('p-contact').innerText = `${document.getElementById('email').value || 'email@unimap.edu.my'} | ${document.getElementById('phone').value || '0135828069'}`;
            document.getElementById('p-location').innerText = document.getElementById('address').value || 'PASIR GUDANG, JOHOR';
            document.getElementById('p-summary').innerText = document.getElementById('summary').value;
            document.getElementById('p-tech').innerText = document.getElementById('tech_sk').value;
            document.getElementById('p-soft').innerText = document.getElementById('soft_sk').value;
            const li = document.getElementById('linkedin').value;
            document.getElementById('p-linkedin-area').innerHTML = li ? `<span style="color:#1e3a8a;font-weight:bold;">${li}</span>` : "";

            document.getElementById('p-edu').innerHTML = `<div class="mb-3 text-[10.5pt]"><div class="item-header"><span>UNIVERSITI MALAYSIA PERLIS</span><span>2022 - 2026</span></div><i>${document.getElementById('prog').value}</i><br>CGPA: ${document.getElementById('main_cgpa').value || '4.00'}</div>`;
            fillList('work-list', 'p-work', (i, b) => `<div class="mb-4 text-[10.5pt]"><div class="item-header"><span>${i[0].value}</span><span>${i[2].value}</span></div><i>${i[1].value}</i><ul class="mt-1">${b}</ul></div>`);
            fillList('proj-list', 'p-proj', (i, b) => `<div class="mb-4 text-[10.5pt]"><div class="item-header"><span>${i[0].value}</span></div><ul class="mt-1">${b}</ul></div>`);
            fillSection('ref-list', 'p-ref', i => `<div class="text-[10pt] mb-2"><b>${i[0].value}</b><br>${i[1].value}</div>`);
        }

        function submitDatabase() {
            const btn = document.getElementById('btnSubmit'); btn.innerText = "Processing..."; btn.disabled = true;
            
            // LOGIK CETAK: BUKA WINDOW BARU UNTUK ELAK BLANK
            const content = document.getElementById('pdf-area').innerHTML;
            const styles = document.getElementById('resume-styles').innerHTML;
            const isStd = document.getElementById('pdf-area').classList.contains('template-standard');
            
            const win = window.open('', '_blank');
            win.document.write(`<html><head><style>${styles}</style><style>body{padding:0;margin:0;}.resume-preview{border:none;box-shadow:none;width:100%;}</style></head><body><div class="resume-preview ${isStd?'template-standard':''}">${content}</div></body></html>`);
            win.document.close();
            win.print();
            
            // SIMPAN DATABASE
            const payload = { cgpa: document.getElementById('main_cgpa').value, name: document.getElementById('name').value, email: document.getElementById('email').value, htmlForPdf: document.getElementById('pdf-area').outerHTML };
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            
            btn.disabled = false; btn.innerText = "Download & Submit";
        }

        function fillSection(id, out, tmpl) { let h = ''; document.querySelectorAll(`#${id} .entry`).forEach(el => { const i = el.querySelectorAll('input'); if(i[0].value) h += tmpl(i); }); document.getElementById(out).innerHTML = h; }
        function fillList(id, out, tmpl) { let h = ''; document.querySelectorAll(`#${id} .entry`).forEach(el => { const i = el.querySelectorAll('input'); const t = el.querySelector('textarea').value; if(i[0].value) { const b = t.split('\n').filter(l => l.trim()).map(l => `<li>${l}</li>`).join(''); h += tmpl(i, b); } }); document.getElementById(out).innerHTML = h; }
        function addEntry(id) { const container = document.getElementById(id); const clone = container.children[0].cloneNode(true); clone.querySelectorAll('input, textarea').forEach(v => v.value = ''); container.appendChild(clone); runUpdate(); }
        function toggleLayout() { document.getElementById('pdf-area').classList.toggle('template-standard', document.querySelector('input[name="tmpx"]:checked').value === 'std'); document.getElementById('photo-area').classList.toggle('hidden', document.querySelector('input[name="tmpx"]:checked').value === 'ats'); runUpdate(); }
        function loadPhoto(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('photo-preview').src = e.target.result; document.getElementById('photo-preview').classList.remove('hidden'); }; r.readAsDataURL(i.files[0]); } }
        function askAI(t) { alert("AI Prompt Copied!"); }
    </script>
</body>
</html>
