<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated ATS Resume Generator - UniMAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .resume-preview { border: none !important; box-shadow: none !important; width: 100%; margin: 0; padding: 0; }
        }
        /* STANDARD ATS: ARIAL 11PT */
        .resume-preview { font-family: 'Arial', sans-serif; color: #1a1a1a; line-height: 1.4; }
        .resume-preview h1 { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin: 0; text-align: center; }
        .resume-preview h2 { border-bottom: 2px solid #333; margin-top: 12px; margin-bottom: 5px; font-size: 13pt; font-weight: bold; color: #000; text-transform: uppercase; text-align: left; }
        .resume-preview ul { list-style-type: disc !important; margin-left: 1.2rem !important; padding-left: 0 !important; display: block !important; }
        .resume-preview li { display: list-item !important; margin-bottom: 2px; font-size: 11pt; }
        .section-content { font-size: 11pt; text-align: justify; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; }
        
        .ai-btn { background: linear-gradient(45deg, #4f46e5, #9333ea); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .draft-badge { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <div class="bg-white p-6 rounded-lg shadow no-print h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b pb-2">
                <h1 class="text-2xl font-bold text-blue-800">Resume Builder</h1>
                <div id="status-draft" class="draft-badge" style="display:none;">Auto-Saved</div>
            </div>
            
            <div class="bg-blue-50 p-4 rounded mb-6 border border-blue-200 space-y-3 text-sm">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase">Level</label>
                        <select id="level" class="w-full p-2 border rounded bg-white" onchange="handleInput()">
                            <option value="Undergraduate">Undergraduate</option>
                            <option value="Diploma">Diploma</option>
                            <option value="Postgraduate">Postgraduate</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase">Year</label>
                        <select id="year" class="w-full p-2 border rounded bg-white" onchange="handleInput()">
                            <option value="Year 1">Year 1</option>
                            <option value="Year 2">Year 2</option>
                            <option value="Year 3">Year 3</option>
                            <option value="Year 4">Year 4</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Faculty</label>
                    <select id="faculty" class="w-full p-2 border rounded bg-white" onchange="handleInput()">
                        <option value="Fakulti Kejuruteraan & Teknologi Elektrik">Fakulti Kejuruteraan & Teknologi Elektrik</option>
                        <option value="Fakulti Kejuruteraan & Teknologi Elektronik">Fakulti Kejuruteraan & Teknologi Elektronik</option>
                        <option value="Fakulti Kejuruteraan & Teknologi Kimia">Fakulti Kejuruteraan & Teknologi Kimia</option>
                        <option value="Fakulti Kejuruteraan & Teknologi Mekanikal">Fakulti Kejuruteraan & Teknologi Mekanikal</option>
                        <option value="Fakulti Kejuruteraan & Teknologi Awam">Fakulti Kejuruteraan & Teknologi Awam</option>
                        <option value="Fakulti Komputeran Cerdas">Fakulti Komputeran Cerdas</option>
                        <option value="Fakulti Perniagaan & Komunikasi">Fakulti Perniagaan & Komunikasi</option>
                    </select>
                </div>
                <input type="text" id="prog" placeholder="Programme Name" class="w-full p-2 border rounded" oninput="handleInput()">
            </div>

            <div class="space-y-6">
                <section>
                    <h3 class="font-bold border-b-2 border-blue-500 mb-3 text-blue-700 uppercase text-xs">1. Personal Info</h3>
                    <input type="text" id="name" placeholder="Full Name" class="w-full p-2 border rounded mb-2" oninput="handleInput()">
                    <input type="text" id="email" placeholder="Email" class="w-full p-2 border rounded mb-2" oninput="handleInput()">
                    <input type="text" id="phone" placeholder="Phone" class="w-full p-2 border rounded mb-2" oninput="handleInput()">
                    <input type="text" id="address" placeholder="Address" class="w-full p-2 border rounded mb-2" oninput="handleInput()">
                    <input type="text" id="linkedin" placeholder="LinkedIn URL" class="w-full p-2 border rounded mb-2" oninput="handleInput()">
                </section>

                <section>
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold border-b-2 border-blue-500 text-blue-700 uppercase text-xs">2. Summary</h3>
                        <span onclick="aiHelp('summary')" class="ai-btn">✨ AI HELP</span>
                    </div>
                    <textarea id="summary" placeholder="Summary..." class="w-full p-2 border rounded h-24 text-sm" oninput="handleInput()"></textarea>
                </section>

                <section class="p-3 border rounded bg-gray-50">
                    <div class="flex justify-between items-center mb-2"><h3 class="font-bold uppercase text-xs">3. Education</h3><button onclick="addFields('edu-group')" class="bg-blue-600 text-white px-3 rounded-full font-bold shadow">+</button></div>
                    <div id="edu-group">
                        <div class="p-2 border bg-white rounded entry mb-2">
                            <input type="text" placeholder="Institution" class="w-full border-b mb-1 p-1 font-bold text-sm" oninput="handleInput()">
                            <input type="text" placeholder="Degree" class="w-full border-b mb-1 p-1 text-sm" oninput="handleInput()">
                            <input type="text" placeholder="Date" class="w-full border-b mb-1 p-1 text-sm" oninput="handleInput()">
                            <input type="text" placeholder="CGPA/Grade" class="w-full p-1 text-sm italic" oninput="handleInput()">
                        </div>
                    </div>
                </section>

                <section class="p-3 border rounded bg-gray-50">
                    <div class="flex justify-between items-center mb-2"><h3 class="font-bold uppercase text-xs">4. Experience</h3><button onclick="addFields('work-group')" class="bg-blue-600 text-white px-3 rounded-full font-bold shadow">+</button></div>
                    <div id="work-group">
                        <div class="p-2 border bg-white rounded entry mb-2">
                            <input type="text" placeholder="Job Title" class="w-full border-b mb-1 p-1 font-bold text-sm" oninput="handleInput()">
                            <input type="text" placeholder="Company" class="w-full border-b mb-1 p-1 text-sm" oninput="handleInput()">
                            <input type="text" placeholder="Date" class="w-full border-b mb-1 p-1 text-sm" oninput="handleInput()">
                            <textarea placeholder="Responsibilities (Enter for bullet)" class="w-full p-1 h-20 text-sm mt-1" oninput="handleInput()"></textarea>
                        </div>
                    </div>
                </section>

                <section class="p-3 border rounded bg-gray-50">
                    <div class="flex justify-between items-center mb-2"><h3 class="font-bold uppercase text-xs">5. Projects</h3><button onclick="addFields('proj-group')" class="bg-blue-600 text-white px-3 rounded-full font-bold shadow">+</button></div>
                    <div id="proj-group">
                        <div class="p-2 border bg-white rounded entry mb-2">
                            <input type="text" placeholder="Project Title" class="w-full border-b mb-1 p-1 font-bold text-sm" oninput="handleInput()">
                            <input type="text" placeholder="Date" class="w-full border-b mb-1 p-1 text-sm" oninput="handleInput()">
                            <textarea placeholder="Description (Enter for bullet)" class="w-full p-1 h-20 text-sm mt-1" oninput="handleInput()"></textarea>
                        </div>
                    </div>
                </section>

                <section class="p-3 border rounded bg-gray-50">
                    <div class="flex justify-between items-center mb-2"><h3 class="font-bold uppercase text-xs">9. References</h3><button onclick="addFields('ref-group')" class="bg-blue-600 text-white px-3 rounded-full font-bold shadow">+</button></div>
                    <div id="ref-group">
                        <div class="p-2 border bg-white rounded entry mb-2">
                            <input type="text" placeholder="Name" class="w-full border-b mb-1 p-1 font-bold text-sm" oninput="handleInput()">
                            <input type="text" placeholder="Position" class="w-full border-b mb-1 p-1 text-sm" oninput="handleInput()">
                            <input type="text" placeholder="Organization" class="w-full border-b mb-1 p-1 text-sm" oninput="handleInput()">
                            <input type="text" placeholder="Phone/Email" class="w-full p-1 text-sm" oninput="handleInput()">
                        </div>
                    </div>
                </section>

                <div class="grid grid-cols-2 gap-4">
                    <section><h3 class="font-bold text-blue-700 uppercase text-xs">Skills</h3><textarea id="skills" placeholder="Skills..." class="w-full p-2 border rounded text-xs h-20" oninput="handleInput()"></textarea></section>
                    <section><h3 class="font-bold text-blue-700 uppercase text-xs">Languages</h3><textarea id="langs" placeholder="Languages..." class="w-full p-2 border rounded text-xs h-20" oninput="handleInput()"></textarea></section>
                </div>
            </div>

            <div class="mt-8 flex gap-2">
                <button onclick="clearDraft()" class="w-1/3 bg-gray-400 text-white py-4 rounded-xl font-bold hover:bg-red-600 transition uppercase text-sm">Reset</button>
                <button onclick="handleDownload()" id="submitBtn" class="w-2/3 bg-blue-800 text-white py-4 rounded-xl font-bold hover:bg-black transition uppercase tracking-widest text-sm shadow-lg">Download & Submit</button>
            </div>
        </div>

        <div class="bg-white p-12 shadow-2xl resume-preview min-h-[29.7cm] border" id="print-area">
            <header style="text-align: center !important; margin-bottom: 20px;">
                <h1 id="out-name">YOUR FULL NAME</h1>
                <p style="font-size: 11pt; margin: 5px 0;">
                    <span id="out-email">email@example.com</span> | <span id="out-phone">012-3456789</span> | <span id="out-address">Address</span>
                </p>
                <p id="out-linkedin" style="color: blue; font-size: 10pt; font-style: italic;"></p>
            </header>

            <section><h2>Professional Summary</h2><p id="out-summary" class="section-content"></p></section>
            <section><h2>Education</h2><div id="out-edu" class="section-content"></div></section>
            <section><h2>Work Experience</h2><div id="out-work" class="section-content"></div></section>
            <section><h2>Projects</h2><div id="out-proj" class="section-content"></div></section>
            
            <div class="grid grid-cols-2 gap-8">
                <section><h2>Skills</h2><p id="out-skills" class="section-content whitespace-pre-line"></p></section>
                <section><h2>Languages</h2><p id="out-langs" class="section-content whitespace-pre-line"></p></section>
            </div>

            <section><h2>References</h2><div id="out-ref" class="section-content grid grid-cols-2 gap-4"></div></section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkaWJPDdfWgEcWbzMpIoZPw7FHQGuz7rnIeL18eM1DGBI2cFtX3KVb-nWtV_vCu9fK1g/exec';

        window.onload = function() { loadDraft(); update(); };

        function handleInput() { update(); saveDraft(); }

        function saveDraft() {
            const inputs = ['level', 'year', 'faculty', 'prog', 'name', 'email', 'phone', 'address', 'linkedin', 'summary', 'skills', 'langs'];
            const data = {};
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) data[id] = el.value;
            });
            data.edu = document.getElementById('edu-group').innerHTML;
            data.work = document.getElementById('work-group').innerHTML;
            data.proj = document.getElementById('proj-group').innerHTML;
            data.ref = document.getElementById('ref-group').innerHTML;
            
            localStorage.setItem('resume_draft', JSON.stringify(data));
            document.getElementById('status-draft').style.display = 'inline-block';
        }

        function loadDraft() {
            const draft = localStorage.getItem('resume_draft');
            if (draft) {
                const data = JSON.parse(draft);
                Object.keys(data).forEach(key => {
                    const el = document.getElementById(key);
                    if (el && !['edu','work','proj','ref'].includes(key)) el.value = data[key];
                });
                if(data.edu) document.getElementById('edu-group').innerHTML = data.edu;
                if(data.work) document.getElementById('work-group').innerHTML = data.work;
                if(data.proj) document.getElementById('proj-group').innerHTML = data.proj;
                if(data.ref) document.getElementById('ref-group').innerHTML = data.ref;
                
                document.querySelectorAll('.entry input, .entry textarea').forEach(el => el.oninput = handleInput);
            }
        }

        function clearDraft() { if(confirm("Clear all data?")) { localStorage.removeItem('resume_draft'); location.reload(); } }

        function addFields(id) {
            const container = document.getElementById(id);
            const clone = container.children[0].cloneNode(true);
            clone.querySelectorAll('input, textarea').forEach(i => { i.value = ''; i.oninput = handleInput; });
            container.appendChild(clone);
            saveDraft();
        }

        function update() {
            document.getElementById('out-name').innerText = document.getElementById('name').value || 'YOUR FULL NAME';
            document.getElementById('out-email').innerText = document.getElementById('email').value || 'email@example.com';
            document.getElementById('out-phone').innerText = document.getElementById('phone').value || '012-3456789';
            document.getElementById('out-address').innerText = document.getElementById('address').value || 'Address';
            document.getElementById('out-linkedin').innerText = document.getElementById('linkedin').value;
            document.getElementById('out-summary').innerText = document.getElementById('summary').value;

            updateSection('edu-group', 'out-edu', (i) => `<div class="mb-3"><div class="item-header"><span>${i[0].value}</span><span>${i[2].value}</span></div><i>${i[1].value}</i><br>Grade: ${i[3].value}</div>`);
            updateListSection('work-group', 'out-work', (i, b) => `<div class="mb-4"><div class="item-header"><span>${i[0].value}</span><span>${i[2].value}</span></div><i>${i[1].value}</i><ul class="mt-1">${b}</ul></div>`);
            updateListSection('proj-group', 'out-proj', (i, b) => `<div class="mb-4"><div class="item-header"><span>${i[0].value}</span><span>${i[1].value}</span></div><ul class="mt-1">${b}</ul></div>`);
            updateSection('ref-group', 'out-ref', (i) => `<div class="text-[10pt]"><b>${i[0].value}</b><br>${i[1].value}<br>${i[2].value}<br>${i[3].value}</div>`);

            document.getElementById('out-skills').innerText = document.getElementById('skills').value;
            document.getElementById('out-langs').innerText = document.getElementById('langs').value;
        }

        function updateSection(groupId, outId, template) {
            let h = '';
            document.querySelectorAll(`#${groupId} .entry`).forEach(el => {
                const inputs = el.querySelectorAll('input');
                if(inputs[0].value) h += template(inputs);
            });
            document.getElementById(outId).innerHTML = h;
        }

        function updateListSection(groupId, outId, template) {
            let h = '';
            document.querySelectorAll(`#${groupId} .entry`).forEach(el => {
                const i = el.querySelectorAll('input');
                const t = el.querySelector('textarea').value;
                if(i[0].value) {
                    const bullets = t.split('\n').filter(l => l.trim()).map(l => `<li>${l}</li>`).join('');
                    h += template(i, bullets);
                }
            });
            document.getElementById(outId).innerHTML = h;
        }

        function aiHelp(type) {
            let p = `Write ATS summary for ${document.getElementById('prog').value} student`;
            navigator.clipboard.writeText(p); alert("AI Prompt copied!");
        }

        async function handleDownload() {
            const btn = document.getElementById('submitBtn'); btn.innerText = "Saving..."; btn.disabled = true;
            const data = {
                level: document.getElementById('level').value,
                year: document.getElementById('year').value,
                faculty: document.getElementById('faculty').value,
                program: document.getElementById('prog').value,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                htmlForPdf: document.getElementById('print-area').innerHTML
            };
            try { 
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }); 
                alert("Saved to Database & Drive! Now printing...");
                window.print(); 
            } catch (err) { alert("Error."); }
            btn.disabled = false; btn.innerText = "Download & Submit";
        }
    </script>
</body>
</html>
