<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS & Standard Resume Generator - UniMAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .resume-preview { border: none !important; box-shadow: none !important; width: 100%; margin: 0; padding: 0; }
        }
        
        /* BASE STYLE (ARIAL 11PT) */
        .resume-preview { font-family: 'Arial', sans-serif; color: #1a1a1a; line-height: 1.4; background: white; }
        .resume-preview h1 { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin: 0; }
        .resume-preview h2 { border-bottom: 2px solid #333; margin-top: 12px; margin-bottom: 5px; font-size: 13pt; font-weight: bold; text-transform: uppercase; }
        .section-content { font-size: 11pt; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; }
        .resume-preview ul { list-style-type: disc !important; margin-left: 1.2rem !important; }
        .resume-preview li { font-size: 11pt; margin-bottom: 2px; }

        /* TEMPLATE 2 (STANDARD WITH PHOTO) */
        .template-standard header { display: flex; align-items: center; gap: 20px; text-align: left !important; border-bottom: 3px solid #1e3a8a; padding-bottom: 15px; }
        .template-standard #photo-preview { width: 120px; height: 150px; border: 1px solid #ddd; object-fit: cover; display: block; }
        .template-standard h2 { background: #1e3a8a; color: white; border: none; padding: 5px 10px; }

        /* HIDDEN ELEMENTS */
        .hidden-photo { display: none; }
        .ai-btn { background: linear-gradient(45deg, #4f46e5, #9333ea); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .draft-badge { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <div class="bg-white p-6 rounded-lg shadow no-print h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h1 class="text-2xl font-bold text-blue-800">UniMAP Resume Builder</h1>
                <div id="status-draft" class="draft-badge" style="display:none;">Saved</div>
            </div>

            <div class="bg-yellow-50 p-3 rounded border border-yellow-200 mb-6">
                <label class="block text-xs font-bold text-yellow-800 uppercase mb-2">Pilih Template</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="tmpl" value="ats" checked onchange="toggleTemplate()"> 
                        <span class="text-sm font-semibold">Template 1 (ATS Friendly)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="tmpl" value="standard" onchange="toggleTemplate()"> 
                        <span class="text-sm font-semibold">Template 2 (Standard + Foto)</span>
                    </label>
                </div>
            </div>
            
            <div class="bg-blue-50 p-4 rounded mb-6 border border-blue-200 space-y-3 text-sm">
                <div id="photo-upload-sec" class="hidden">
                    <label class="block text-xs font-bold text-gray-700 uppercase">Gambar Profil (Format Passport)</label>
                    <input type="file" id="photo-input" accept="image/*" class="w-full text-xs" onchange="previewImage(this)">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-xs font-bold text-gray-700 uppercase">Level</label><select id="level" class="w-full p-2 border rounded bg-white" onchange="handleInput()"><option value="Undergraduate">Undergraduate</option><option value="Diploma">Diploma</option></select></div>
                    <div><label class="block text-xs font-bold text-gray-700 uppercase">Year</label><select id="year" class="w-full p-2 border rounded bg-white" onchange="handleInput()"><option value="Year 1">Year 1</option><option value="Year 2">Year 2</option><option value="Year 3">Year 3</option><option value="Year 4">Year 4</option></select></div>
                </div>
                <input type="text" id="prog" placeholder="Programme Name" class="w-full p-2 border rounded" oninput="handleInput()">
            </div>

            <div class="space-y-6">
                <section>
                    <h3 class="font-bold border-b-2 border-blue-500 mb-3 text-blue-700 uppercase text-xs">1. Personal Info</h3>
                    <input type="text" id="name" placeholder="Full Name" class="w-full p-2 border rounded mb-2 font-bold uppercase" oninput="handleInput()">
                    <input type="text" id="email" placeholder="Email Address" class="w-full p-2 border rounded mb-2" oninput="handleInput()">
                    <input type="text" id="phone" placeholder="Phone Number" class="w-full p-2 border rounded mb-2" oninput="handleInput()">
                    <input type="text" id="address" placeholder="Address (City, State)" class="w-full p-2 border rounded mb-2" oninput="handleInput()">
                    <input type="text" id="linkedin" placeholder="LinkedIn URL" class="w-full p-2 border rounded mb-2" oninput="handleInput()">
                </section>

                <section>
                    <div class="flex justify-between items-center mb-2"><h3 class="font-bold border-b-2 border-blue-500 text-blue-700 uppercase text-xs">2. Summary</h3><span onclick="aiHelp()" class="ai-btn">✨ AI HELP</span></div>
                    <textarea id="summary" placeholder="Brief summary..." class="w-full p-2 border rounded h-24 text-sm" oninput="handleInput()"></textarea>
                </section>

                <section class="p-3 border rounded bg-gray-50"><div class="flex justify-between items-center mb-2"><h3 class="font-bold uppercase text-xs">3. Education</h3><button onclick="addFields('edu-group')" class="bg-blue-600 text-white px-3 rounded-full font-bold shadow">+</button></div><div id="edu-group"><div class="p-2 border bg-white rounded entry mb-2"><input type="text" placeholder="Institution" class="w-full border-b mb-1 p-1 font-bold text-sm" oninput="handleInput()"><input type="text" placeholder="Degree" class="w-full border-b mb-1 p-1 text-sm" oninput="handleInput()"><input type="text" placeholder="Date" class="w-full border-b mb-1 p-1 text-sm" oninput="handleInput()"><input type="text" placeholder="CGPA" class="w-full p-1 text-sm italic" oninput="handleInput()"></div></div></section>

                <section class="p-3 border rounded bg-gray-50"><div class="flex justify-between items-center mb-2"><h3 class="font-bold uppercase text-xs">4. Experience</h3><button onclick="addFields('work-group')" class="bg-blue-600 text-white px-3 rounded-full font-bold shadow">+</button></div><div id="work-group"><div class="p-2 border bg-white rounded entry mb-2"><input type="text" placeholder="Job Title" class="w-full border-b mb-1 p-1 font-bold text-sm" oninput="handleInput()"><input type="text" placeholder="Company" class="w-full border-b mb-1 p-1 text-sm" oninput="handleInput()"><input type="text" placeholder="Date" class="w-full border-b mb-1 p-1 text-sm" oninput="handleInput()"><textarea placeholder="Responsibilities (Enter for bullet)" class="w-full p-1 h-20 text-sm mt-1" oninput="handleInput()"></textarea></div></div></section>

                <div class="grid grid-cols-2 gap-4">
                    <section><h3 class="font-bold text-blue-700 uppercase text-xs">Skills</h3><textarea id="skills" placeholder="List skills..." class="w-full p-2 border rounded text-xs h-20" oninput="handleInput()"></textarea></section>
                    <section><h3 class="font-bold text-blue-700 uppercase text-xs">Languages</h3><textarea id="langs" placeholder="List languages..." class="w-full p-2 border rounded text-xs h-20" oninput="handleInput()"></textarea></section>
                </div>
            </div>

            <div class="mt-8 flex gap-2">
                <button onclick="clearDraft()" class="w-1/3 bg-gray-400 text-white py-4 rounded-xl font-bold uppercase text-sm">Reset</button>
                <button onclick="handleDownload()" id="submitBtn" class="w-2/3 bg-blue-800 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-sm shadow-lg">Download & Submit</button>
            </div>
        </div>

        <div class="bg-white p-12 shadow-2xl resume-preview min-h-[29.7cm] border" id="print-area">
            <header id="resume-header" style="text-align: center;">
                <img id="photo-preview" src="" class="hidden-photo">
                <div class="header-info w-full">
                    <h1 id="out-name">YOUR FULL NAME</h1>
                    <p style="font-size: 11pt; margin: 5px 0;">
                        <span id="out-email">email@example.com</span> | <span id="out-phone">012-3456789</span> | <span id="out-address">Address</span>
                    </p>
                    <p id="out-linkedin" style="color: blue; font-size: 10pt; font-style: italic;"></p>
                </div>
            </header>

            <section><h2>Professional Summary</h2><p id="out-summary" class="section-content text-justify"></p></section>
            <section><h2>Education</h2><div id="out-edu" class="section-content"></div></section>
            <section><h2>Work Experience</h2><div id="out-work" class="section-content"></div></section>
            <div class="grid grid-cols-2 gap-8">
                <section><h2>Skills</h2><p id="out-skills" class="section-content whitespace-pre-line"></p></section>
                <section><h2>Languages</h2><p id="out-langs" class="section-content whitespace-pre-line"></p></section>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6_Gn1e97CmNeuhYSKsDWER4CH5sqSWQ2IB5Jp6Q81rRumZH94iOSIe0me5H1-oOtm/exec';

        window.onload = function() { loadDraft(); update(); };

        function toggleTemplate() {
            const tmpl = document.querySelector('input[name="tmpl"]:checked').value;
            const preview = document.getElementById('print-area');
            const photoInputSec = document.getElementById('photo-upload-sec');
            const photoPreview = document.getElementById('photo-preview');
            const header = document.getElementById('resume-header');

            if(tmpl === 'standard') {
                preview.classList.add('template-standard');
                photoInputSec.classList.remove('hidden');
                photoPreview.classList.remove('hidden-photo');
                header.style.textAlign = "left";
            } else {
                preview.classList.remove('template-standard');
                photoInputSec.classList.add('hidden');
                photoPreview.classList.add('hidden-photo');
                header.style.textAlign = "center";
            }
            update();
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { document.getElementById('photo-preview').src = e.target.result; update(); };
                reader.readAsDataURL(file);
            }
        }

        function handleInput() { update(); saveDraft(); }

        function saveDraft() {
            const inputs = ['level', 'year', 'prog', 'name', 'email', 'phone', 'address', 'linkedin', 'summary', 'skills', 'langs'];
            const data = { tmpl: document.querySelector('input[name="tmpl"]:checked').value };
            inputs.forEach(id => { const el = document.getElementById(id); if (el) data[id] = el.value; });
            data.edu = document.getElementById('edu-group').innerHTML;
            data.work = document.getElementById('work-group').innerHTML;
            localStorage.setItem('resume_draft_v2', JSON.stringify(data));
            document.getElementById('status-draft').style.display = 'inline-block';
        }

        function loadDraft() {
            const draft = localStorage.getItem('resume_draft_v2');
            if (draft) {
                const data = JSON.parse(draft);
                if(data.tmpl) {
                    document.querySelector(`input[name="tmpl"][value="${data.tmpl}"]`).checked = true;
                    toggleTemplate();
                }
                Object.keys(data).forEach(key => {
                    const el = document.getElementById(key);
                    if (el && !['edu','work','tmpl'].includes(key)) el.value = data[key];
                });
                if(data.edu) document.getElementById('edu-group').innerHTML = data.edu;
                if(data.work) document.getElementById('work-group').innerHTML = data.work;
                document.querySelectorAll('.entry input, .entry textarea').forEach(el => el.oninput = handleInput);
            }
        }

        function addFields(id) {
            const container = document.getElementById(id);
            const clone = container.children[0].cloneNode(true);
            clone.querySelectorAll('input, textarea').forEach(i => { i.value = ''; i.oninput = handleInput; });
            container.appendChild(clone);
            saveDraft();
        }

        function update() {
            document.getElementById('out-name').innerText = (document.getElementById('name').value || 'YOUR FULL NAME').toUpperCase();
            document.getElementById('out-email').innerText = document.getElementById('email').value || 'email@example.com';
            document.getElementById('out-phone').innerText = document.getElementById('phone').value || '012-3456789';
            document.getElementById('out-address').innerText = document.getElementById('address').value || 'Address';
            document.getElementById('out-linkedin').innerText = document.getElementById('linkedin').value;
            document.getElementById('out-summary').innerText = document.getElementById('summary').value;

            updateSection('edu-group', 'out-edu', (i) => `<div class="mb-3"><div class="item-header"><span>${i[0].value}</span><span>${i[2].value}</span></div><i>${i[1].value}</i><br>Grade: ${i[3].value}</div>`);
            updateListSection('work-group', 'out-work', (i, b) => `<div class="mb-4"><div class="item-header"><span>${i[0].value}</span><span>${i[2].value}</span></div><i>${i[1].value}</i><ul class="mt-1">${b}</ul></div>`);

            document.getElementById('out-skills').innerText = document.getElementById('skills').value;
            document.getElementById('out-langs').innerText = document.getElementById('langs').value;
        }

        function updateSection(groupId, outId, template) {
            let h = ''; document.querySelectorAll(`#${groupId} .entry`).forEach(el => { const i = el.querySelectorAll('input'); if(i[0].value) h += template(i); });
            document.getElementById(outId).innerHTML = h;
        }

        function updateListSection(groupId, outId, template) {
            let h = ''; document.querySelectorAll(`#${groupId} .entry`).forEach(el => {
                const i = el.querySelectorAll('input'); const t = el.querySelector('textarea').value;
                if(i[0].value) { const b = t.split('\n').filter(l => l.trim()).map(l => `<li>${l}</li>`).join(''); h += template(i, b); }
            });
            document.getElementById(outId).innerHTML = h;
        }

        function clearDraft() { if(confirm("Reset all data?")) { localStorage.removeItem('resume_draft_v2'); location.reload(); } }

        function aiHelp() { alert("Prompt AI: Write ATS summary for a student in " + document.getElementById('prog').value); }

        async function handleDownload() {
            const btn = document.getElementById('submitBtn'); btn.innerText = "Saving..."; btn.disabled = true;
            const data = {
                level: document.getElementById('level').value, year: document.getElementById('year').value, program: document.getElementById('prog').value,
                name: document.getElementById('name').value, email: document.getElementById('email').value, phone: document.getElementById('phone').value,
                htmlForPdf: document.getElementById('print-area').innerHTML
            };
            try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }); window.print(); } catch (err) { alert("Error."); }
            btn.disabled = false; btn.innerText = "Download & Submit";
        }
    </script>
</body>
</html>
