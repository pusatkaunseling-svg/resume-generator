<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSKA Resume System v27.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="resume-styles">
        /* --- FORMAT RESUME A4 --- */
        #pdf-area {
            font-family: 'Arial', sans-serif; color: #1a1a1a; line-height: 1.4; background: white;
            width: 210mm; min-height: 297mm; padding: 15mm; box-sizing: border-box; margin: auto;
        }
        #pdf-area h1 { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin: 0; text-align: center; }
        #pdf-area h2 { border-bottom: 2px solid #333; margin-top: 15px; margin-bottom: 5px; font-size: 12pt; font-weight: bold; text-transform: uppercase; text-align: left; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; }
        #pdf-area ul { list-style-type: disc !important; margin-left: 1.2rem !important; margin-top: 2px; }
        .section-content { font-size: 10.5pt; margin-bottom: 8px; }

        /* PHOTO LAYOUT (BLUE) */
        .template-photo header { border-bottom: 3px solid #1e3a8a; padding-bottom: 15px; text-align: left !important; display: flex !important; align-items: center; gap: 20px; }
        .template-photo #photo-preview { width: 110px; height: 140px; border: 1px solid #ddd; object-fit: cover; display: block !important; }
        .template-photo h2 { background: #1e3a8a !important; color: white !important; border: none !important; padding: 5px 10px !important; }

        /* UI Styling */
        input, select, textarea { font-size: 13px !important; padding: 10px !important; border: 1px solid #d1d5db !important; border-radius: 6px !important; width: 100%; }
        label { font-size: 11px; font-weight: 800; color: #374151; text-transform: uppercase; margin-bottom: 2px; display: block; }

        @media (max-width: 1024px) {
            .preview-container { overflow-x: auto; background: #555; padding: 10px; }
            #pdf-area { transform: scale(0.4); transform-origin: top center; }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex flex-col lg:flex-row h-screen">
        
        <div class="lg:w-1/2 p-6 bg-white overflow-y-auto border-r shadow-xl no-print">
            <h1 class="text-2xl font-black text-blue-900 mb-6">PUSKA v27.0</h1>

            <div class="bg-blue-900 p-5 rounded-xl text-white mb-8 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-white">LEVEL</label><select id="level" class="text-black"><option>Undergraduate</option><option>Diploma</option><option>Postgraduate</option></select></div>
                    <div><label class="text-white">YEAR</label><select id="year" class="text-black"><option>Year 4</option><option>Year 3</option><option>Year 2</option><option>Year 1</option></select></div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2"><label class="text-white">FACULTY</label>
                        <select id="faculty" class="text-black">
                            <option>Faculty of Electrical Engineering & Technology</option>
                            <option>Faculty of Electronic Engineering & Technology</option>
                            <option>Faculty of Chemical Engineering & Technology</option>
                            <option>Faculty of Civil Engineering & Technology</option>
                            <option>Faculty of Mechanical Engineering & Technology</option>
                            <option>Faculty of Intelligent Computing</option>
                            <option>Faculty of Business & Communication</option>
                        </select>
                    </div>
                    <div><label class="text-yellow-400">CGPA (SHEET)</label><input type="text" id="main_cgpa" value="4.00" class="text-black text-center font-bold"></div>
                </div>
                <div><label class="text-white">PROGRAM (OFFICIAL LIST)</label>
                    <select id="prog" class="text-black font-semibold text-[10px]" onchange="runUpdate()">
                        <optgroup label="Postgraduate"><option>PASCASISWAZAH (PHD)</option><option>PASCASISWAZAH (SARJANA)</option></optgroup>
                        <optgroup label="Undergraduate"><option>SARJANA MUDA KEJURUTERAAN ALAM SEKITAR</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN AWAM (PEMBINAAN)</option><option>SARJANA MUDA TEKNOLOGI PEMBINAAN BANGUNAN</option><option>SARJANA MUDA KEJURUTERAAN MIKROELEKTRONIK</option><option>SARJANA MUDA KEJURUTERAAN KOMPUTER</option><option>SARJANA MUDA KEJURUTERAAN ELEKTRONIK BIOPERUBATAN</option><option>SARJANA MUDA KEJURUTERAAN ELEKTRONIK</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN ELEKTRONIK (SISTEM ELEKTRONIK)</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN ELEKTRONIK (REKA BENTUK TELEKOMUNIKASI ELEKTRONIK)</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN ELEKTRONIK (REKA BENTUK RANGKAIAN ELEKTRONIK)</option><option>SARJANA MUDA TEKNOLOGI DALAM AUTOMASI ELEKTRONIK INDUSTRI</option><option>SARJANA MUDA KEJURUTERAAN ELEKTRIK</option><option>SARJANA MUDA KEJURUTERAAN MEKATRONIK</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN ELEKTRIK (KUASA INDUSTRI)</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN ELEKTRIK (TEKNOLOGI ROBOTIK DAN AUTOMASI)</option><option>SARJANA MUDA TEKNOLOGI DALAM PENYELENGGARAAN SISTEM ELEKTRIK</option><option>SARJANA MUDA KEJURUTERAAN BAHAN</option><option>SARJANA MUDA KEJURUTERAAN KIMIA</option><option>SARJANA MUDA KEJURUTERAAN POLIMER</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN KIMIA (TEKNOLOGI MAKANAN)</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN KIMIA (PROSES KIMIA INDUSTRI)</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN KIMIA (BIOTEKNOLOGI INDUSTRI)</option><option>SARJANA MUDA KEJURUTERAAN MEKANIKAL</option><option>SARJANA MUDA KEJURUTERAAN PEMBUATAN</option><option>SARJANA MUDA KEJURUTERAAN PERTANIAN</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN MEKANIKAL (PEMESINAN)</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN MEKANIKAL (SISTEM PERTANIAN)</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN MEKANIKAL (REKA BENTUK PRODUK)</option><option>SARJANA MUDA TEKNOLOGI KEJURUTERAAN MEKANIKAL (PEMPROSESAN BAHAN)</option><option>SARJANA MUDA TEKNOLOGI DALAM PEMESINAN INDUSTRI</option><option>SARJANA MUDA TEKNOLOGI DALAM AUTOMOTIF</option><option>SARJANA MUDA TEKNOLOGI DALAM KIMPALAN</option><option>SARJANA MUDA KOMUNIKASI MEDIA BAHARU</option><option>SARJANA MUDA PERNIAGAAN (PERNIAGAAN ANTARABANGSA)</option><option>SARJANA MUDA PERNIAGAAN (KEJURUTERAAN KEUSAHAWANAN)</option><option>SARJANA MUDA KEJURUTERAAN AWAM</option><option>SARJANA MUDA PERAKAUNAN</option><option>SARJANA MUDA TEKNOLOGI MEDIA INTERAKTIF</option><option selected>SARJANA MUDA SAINS DATA (KECERDASAN BUATAN)</option><option>SARJANA MUDA SAINS GUNAAN (TEKNOLOGI BAHAN DAN METALURQI)</option></optgroup>
                        <optgroup label="Diploma"><option>DIPLOMA KEJURUTERAAN KOMPUTER</option><option>DIPLOMA KEJURUTERAAN ELEKTRONIK</option><option>DIPLOMA KEJURUTERAAN ELEKTRIK</option><option>DIPLOMA KEJURUTERAAN MEKATRONIK</option><option>DIPLOMA TEKNOLOGI KEJURUTERAAN MEKANIKAL</option><option>DIPLOMA KEJURUTERAAN PEMBUATAN</option><option>DIPLOMA KEJURUTERAAN BAHAN</option></optgroup>
                    </select>
                </div>
            </div>

            <div class="space-y-6">
                <section class="p-4 border rounded-xl bg-white shadow-sm">
                    <b class="text-blue-900 block border-b mb-3">1. PERSONAL INFORMATION</b>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <label class="p-2 border rounded cursor-pointer text-center text-xs font-bold"><input type="radio" name="resType" value="ATS" checked onchange="toggleLayout()"> ATS</label>
                        <label class="p-2 border rounded cursor-pointer text-center text-xs font-bold"><input type="radio" name="resType" value="Photo" onchange="toggleLayout()"> PHOTO</label>
                    </div>
                    <div id="photo-input-area" class="hidden mb-3 p-2 bg-gray-50 border rounded text-center"><input type="file" accept="image/*" class="text-xs" onchange="loadPhoto(this)"></div>
                    <label>NAME</label><input type="text" id="fullName" placeholder="FULL NAME" class="font-bold uppercase mb-2" oninput="runUpdate()">
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <div><label>EMAIL</label><input type="text" id="email" placeholder="email@unimap.edu.my" oninput="runUpdate()"></div>
                        <div><label>PHONE</label><input type="text" id="phone" placeholder="013-XXXXXXX" oninput="runUpdate()"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <div><label>LOCATION</label><input type="text" id="address" placeholder="CITY, STATE" class="uppercase" oninput="runUpdate()"></div>
                        <div><label>LINKEDIN</label><input type="text" id="linkedin" placeholder="URL" oninput="runUpdate()"></div>
                    </div>
                </section>

                <section class="p-4 border rounded-xl bg-white shadow-sm">
                    <label>2. PROFESSIONAL SUMMARY</label>
                    <textarea id="summary" class="h-24" oninput="runUpdate()">Final-year Bachelor of Data Science student...</textarea>
                </section>

                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm">
                    <div class="flex justify-between items-center mb-2"><b>3. EDUCATION</b><button onclick="addEntry('edu-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div>
                    <div id="edu-list">
                        <div class="p-3 border bg-white rounded-lg entry mb-2 space-y-2">
                            <input type="text" placeholder="UNIVERSITY" class="font-bold" oninput="runUpdate()">
                            <input type="text" placeholder="DEGREE / DIPLOMA" oninput="runUpdate()">
                            <div class="grid grid-cols-3 gap-1"><input type="text" placeholder="CGPA" oninput="runUpdate()"><input type="text" placeholder="START" oninput="runUpdate()"><input type="text" placeholder="END" oninput="runUpdate()"></div>
                        </div>
                    </div>
                </section>

                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm">
                    <div class="flex justify-between items-center mb-2"><b>4. WORK EXPERIENCE</b><button onclick="addEntry('work-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div>
                    <div id="work-list">
                        <div class="p-3 border bg-white rounded-lg entry mb-2 space-y-2">
                            <input type="text" placeholder="JOB POSITION" class="font-bold" oninput="runUpdate()">
                            <input type="text" placeholder="COMPANY NAME" oninput="runUpdate()">
                            <div class="grid grid-cols-2 gap-1"><input type="text" placeholder="START" oninput="runUpdate()"><input type="text" placeholder="END" oninput="runUpdate()"></div>
                            <textarea placeholder="DESCRIPTION (Enter for bullets)" class="h-20" oninput="runUpdate()"></textarea>
                        </div>
                    </div>
                </section>

                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm">
                    <div class="flex justify-between items-center mb-2"><b>5. PROJECTS</b><button onclick="addEntry('proj-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div>
                    <div id="proj-list">
                        <div class="p-3 border bg-white rounded-lg entry mb-2 space-y-2">
                            <input type="text" placeholder="PROJECT NAME" class="font-bold" oninput="runUpdate()">
                            <textarea placeholder="DESCRIPTION" class="h-16" oninput="runUpdate()"></textarea>
                        </div>
                    </div>
                </section>

                <div class="grid grid-cols-2 gap-2">
                    <section class="p-3 border rounded-xl bg-white shadow-sm"><label>7. TECH SKILL</label><textarea id="tech_sk" class="h-20" oninput="runUpdate()"></textarea></section>
                    <section class="p-3 border rounded-xl bg-white shadow-sm"><label>8. SOFT SKILL</label><textarea id="soft_sk" class="h-20" oninput="runUpdate()"></textarea></section>
                </div>
                <section class="p-4 border rounded-xl bg-white shadow-sm"><label>6. CERTIFICATE</label><textarea id="certs_sk" class="h-16" placeholder="Name - Issued By" oninput="runUpdate()"></textarea></section>
                <section class="p-4 border rounded-xl bg-white shadow-sm"><label>9. LANGUAGE</label><input type="text" id="lang_sk" oninput="runUpdate()"></section>

                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm">
                    <div class="flex justify-between items-center mb-2"><b>10. REFERENCE</b><button onclick="addEntry('ref-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div>
                    <div id="ref-list">
                        <div class="p-3 border bg-white rounded-lg entry mb-2 space-y-2">
                            <input type="text" placeholder="REFEREE NAME" class="font-bold" oninput="runUpdate()">
                            <div class="grid grid-cols-2 gap-1"><input type="text" placeholder="POSITION" oninput="runUpdate()"><input type="text" placeholder="ORGANIZATION" oninput="runUpdate()"></div>
                            <div class="grid grid-cols-2 gap-1"><input type="text" placeholder="EMAIL" oninput="runUpdate()"><input type="text" placeholder="PHONE" oninput="runUpdate()"></div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="mt-10 grid grid-cols-2 gap-4 pb-20">
                <button onclick="location.reload()" class="bg-gray-400 text-white py-4 rounded-xl font-bold">Reset</button>
                <button onclick="submitDatabase()" id="btnSubmit" class="bg-blue-800 text-white py-4 rounded-xl font-bold shadow-xl">Download & Submit</button>
            </div>
        </div>

        <div class="lg:w-1/2 flex justify-center preview-container overflow-y-auto bg-gray-300 no-print">
            <div id="pdf-area" class="shadow-2xl">
                <header class="text-center">
                    <img id="photo-preview" src="" class="hidden" style="width:110px; height:140px; border:1px solid #ddd; object-fit:cover; margin:0 auto 10px;">
                    <h1 id="p-name">YOUR NAME</h1>
                    <p id="p-contact" style="font-size: 10.5pt; margin: 8px 0; font-weight: bold;"></p>
                    <div id="p-linkedin" style="font-size: 10pt; color: #1e3a8a; font-weight: bold;"></div>
                </header>

                <section><h2>Professional Summary</h2><p id="p-summary" class="section-content text-justify"></p></section>
                <section><h2>Education</h2><div id="p-edu"></div></section>
                <section><h2>Work Experience</h2><div id="p-work"></div></section>
                <section><h2>Key Projects</h2><div id="p-proj"></div></section>
                <div class="grid grid-cols-2 gap-8"><section><h2>Technical Skills</h2><p id="p-tech" class="section-content whitespace-pre-line"></p></section><section><h2>Soft Skills</h2><p id="p-soft" class="section-content whitespace-pre-line"></p></section></div>
                <section><h2>Certifications & Languages</h2><p id="p-certs" class="section-content whitespace-pre-line"></p></section>
                <section><h2>References</h2><div id="p-ref" class="grid grid-cols-2 gap-4"></div></section>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz__MC0odIlGMOu78LS_GPnJMlpFb2BkoZ7v4eotxWQBCpraUWzHLOZyrmHaBzQVauOyQ/exec";

        function runUpdate() {
            document.getElementById('p-name').innerText = (document.getElementById('fullName').value || 'YOUR NAME').toUpperCase();
            const contact = `${document.getElementById('email').value || 'EMAIL'}  •  ${document.getElementById('phone').value || 'PHONE'}  •  ${(document.getElementById('address').value || 'LOCATION').toUpperCase()}`;
            document.getElementById('p-contact').innerText = contact;
            document.getElementById('p-linkedin').innerText = document.getElementById('linkedin').value || '';
            document.getElementById('p-summary').innerText = document.getElementById('summary').value;
            document.getElementById('p-tech').innerText = document.getElementById('tech_sk').value;
            document.getElementById('p-soft').innerText = document.getElementById('soft_sk').value;
            document.getElementById('p-certs').innerText = `${document.getElementById('certs_sk').value}\nLanguage: ${document.getElementById('lang_sk').value}`;

            fillSection('edu-list', 'p-edu', i => `<div class="mb-3"><div class="item-header"><span>${i[0].value}</span><span>${i[3].value} - ${i[4].value}</span></div><i>${i[1].value}</i><br><b>CGPA: ${i[2].value}</b></div>`);
            fillList('work-list', 'p-work', (i, b) => `<div class="mb-4"><div class="item-header"><span>${i[0].value}</span><span>${i[2].value} - ${i[3].value}</span></div><i>${i[1].value}</i><ul>${b}</ul></div>`);
            fillList('proj-list', 'p-proj', (i, b) => `<div class="mb-4"><div class="item-header"><span>${i[0].value}</span></div><ul>${b}</ul></div>`);
            fillSection('ref-list', 'p-ref', i => `<div class="text-[10pt]"><b>${i[0].value}</b><br>${i[1].value}, ${i[2].value}<br>E: ${i[3].value} | P: ${i[4].value}</div>`);
        }

        async function submitDatabase() {
            const btn = document.getElementById('btnSubmit');
            const resType = document.querySelector('input[name="resType"]:checked').value;
            btn.innerText = "Processing..."; btn.disabled = true;

            const fullHtml = `<html><head><style>${document.getElementById('resume-styles').innerHTML}</style></head><body><div id="pdf-area" class="${resType==='Photo'?'template-photo':''}">${document.getElementById('pdf-area').innerHTML}</div></body></html>`;

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ resumeType: resType, fullName: document.getElementById('fullName').value, email: document.getElementById('email').value, phone: document.getElementById('phone').value, cgpa: document.getElementById('main_cgpa').value, level: document.getElementById('level').value, year: document.getElementById('year').value, program: document.getElementById('prog').value, faculty: document.getElementById('faculty').value, htmlContent: fullHtml }) });
                alert("Success!");
                const win = window.open('', '_blank'); win.document.write(fullHtml); win.document.close(); win.setTimeout(() => win.print(), 500);
            } catch (e) { alert("Error!"); }
            finally { btn.disabled = false; btn.innerText = "Download & Submit"; }
        }

        function fillSection(id, out, tmpl) { let h = ''; document.querySelectorAll(`#${id} .entry`).forEach(el => { const i = el.querySelectorAll('input'); if(i[0].value) h += tmpl(i); }); document.getElementById(out).innerHTML = h; }
        function fillList(id, out, tmpl) { let h = ''; document.querySelectorAll(`#${id} .entry`).forEach(el => { const i = el.querySelectorAll('input'); const t = el.querySelector('textarea').value; if(i[0].value) { const b = t.split('\n').filter(l => l.trim()).map(l => `<li>${l}</li>`).join(''); h += tmpl(i, b); } }); document.getElementById(out).innerHTML = h; }
        function addEntry(id) { const container = document.getElementById(id); const clone = container.children[0].cloneNode(true); clone.querySelectorAll('input, textarea').forEach(v => v.value = ''); container.appendChild(clone); runUpdate(); }
        function toggleLayout() { const type = document.querySelector('input[name="resType"]:checked').value; document.getElementById('pdf-area').className = (type === 'Photo') ? 'template-photo' : ''; document.getElementById('photo-input-area').classList.toggle('hidden', type === 'ATS'); runUpdate(); }
        function loadPhoto(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('photo-preview').src = e.target.result; document.getElementById('photo-preview').classList.remove('hidden'); }; r.readAsDataURL(i.files[0]); } }
        window.onload = runUpdate;
    </script>
</body>
</html>
