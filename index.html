<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSKA Resume Generator v5.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="resume-styles">
        .resume-preview {
            font-family: 'Arial', sans-serif; color: #1a1a1a; line-height: 1.4; background: white;
            min-height: 297mm; width: 100%; padding: 15mm; box-sizing: border-box; border: 1px solid #ddd;
        }
        .resume-preview h1 { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin: 0; color: black; }
        .resume-preview h2 { border-bottom: 2px solid #333; margin-top: 12px; margin-bottom: 5px; font-size: 13pt; font-weight: bold; text-transform: uppercase; text-align: left; color: black; }
        .template-standard header { display: flex !important; align-items: center !important; gap: 20px !important; border-bottom: 3px solid #1e3a8a !important; padding-bottom: 15px; text-align: left !important; }
        .template-standard #photo-preview { width: 110px; height: 140px; border: 1px solid #ddd; object-fit: cover; display: block !important; }
        .template-standard h2 { background: #1e3a8a !important; color: white !important; border: none !important; padding: 5px 10px !important; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; }
        .resume-preview ul { list-style-type: disc !important; margin-left: 1.2rem !important; }
        .section-content { font-size: 10.5pt; margin-bottom: 8px; }
        .ai-btn { background: linear-gradient(45deg, #1e3a8a, #3b82f6); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; border: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <div class="bg-white p-6 rounded-lg shadow h-[90vh] overflow-y-auto border-t-8 border-blue-900 no-print">
            <div class="flex items-center gap-4 border-b-2 border-blue-900 pb-4 mb-6">
                <img src="https://drive.google.com/thumbnail?id=1MvbeFj62QwwzGHvUCNrmjYqX6IrWTQxN&sz=w200" alt="PUSKA" class="max-h-[60px]">
                <div>
                    <h1 class="text-2xl font-black text-blue-900 leading-none">PUSKA</h1>
                    <p class="text-sm font-bold text-gray-600 tracking-widest uppercase">RESUME GENERATOR v5.9</p>
                </div>
            </div>

            <div class="space-y-6">
                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold uppercase text-xs">6. Certifications</h3>
                        <button onclick="addEntry('cert-list')" class="bg-blue-600 text-white px-3 rounded-full shadow">+</button>
                    </div>
                    <div id="cert-list">
                        <div class="p-3 border bg-white rounded-lg entry mb-2">
                            <input type="text" placeholder="Certificate Name" class="w-full border-b mb-1 p-1 font-bold text-sm" oninput="runUpdate()">
                            <input type="text" placeholder="Issuing Organization" class="w-full border-b mb-1 p-1 text-sm" oninput="runUpdate()">
                            <input type="text" placeholder="Credential URL (Optional)" class="w-full p-1 text-xs border rounded bg-gray-50 mt-1" oninput="runUpdate()">
                        </div>
                    </div>
                </section>

                </div>

            <div class="mt-8 flex gap-2">
                <button onclick="resetAll()" class="w-1/3 bg-gray-400 text-white py-4 rounded-xl font-bold uppercase text-sm">Reset</button>
                <button onclick="submitDatabase()" id="btnSubmit" class="w-2/3 bg-blue-800 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-sm shadow-xl">Download & Submit</button>
            </div>
        </div>

        <div class="bg-gray-200 flex justify-center overflow-y-auto no-print">
            <div class="bg-white resume-preview" id="pdf-area">
                <header id="pdf-header" style="text-align: center;">
                    <div class="w-full">
                        <h1 id="p-name">YOUR FULL NAME</h1>
                        <p style="font-size: 11pt; margin: 5px 0;"><span id="p-email">email@example.com</span> | <span id="p-phone">012-3456789</span></p>
                    </div>
                </header>
                <section><h2>Professional Summary</h2><p id="p-summary" class="section-content text-justify"></p></section>
                <section><h2>Education</h2><div id="p-edu"></div></section>
                <section><h2>Work Experience</h2><div id="p-work"></div></section>
                
                <div class="grid grid-cols-2 gap-8">
                    <section><h2>Technical Skills</h2><p id="p-tech" class="section-content whitespace-pre-line"></p></section>
                    <section><h2>Soft Skills</h2><p id="p-soft" class="section-content whitespace-pre-line"></p></section>
                </div>

                <section><h2>Certifications & Languages</h2>
                    <div id="p-cert"></div>
                    <p id="p-langs" class="section-content mt-2 italic font-semibold"></p>
                </section>
                
                <section><h2>References</h2><div id="p-ref" class="grid grid-cols-2 gap-4"></div></section>
            </div>
        </div>
    </div>

    <script>
        // JS Update for Certification Link
        function runUpdate() {
            // ... (Fungsi update lainnya)
            
            fillSection('cert-list', 'p-cert', i => {
                let link = i[2].value ? `<br><span style="font-size: 9pt; color: blue;">Link: ${i[2].value}</span>` : '';
                return `<div class="mb-2 text-[10.5pt]"><b>${i[0].value}</b> - ${i[1].value}${link}</div>`;
            });

            // ... (Kodingan education, work, projects tetap sama)
        }

        // ... (Fungsi helper lainnya tetap sama)
        function fillSection(id, out, tmpl) { let h = ''; document.querySelectorAll(`#${id} .entry`).forEach(el => { const i = el.querySelectorAll('input'); if(i[0].value) h += tmpl(i); }); document.getElementById(out).innerHTML = h; }
        function addEntry(id) { const container = document.getElementById(id); const clone = container.children[0].cloneNode(true); clone.querySelectorAll('input, textarea').forEach(v => v.value = ''); container.appendChild(clone); runUpdate(); }
    </script>
</body>
</html>
