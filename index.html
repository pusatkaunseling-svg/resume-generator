<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSKA Resume Generator - Master v15.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style id="resume-styles">
        /* --- PAPARAN SKRIN (SCREEN VIEW) --- */
        .resume-preview {
            font-family: 'Arial', sans-serif; color: #1a1a1a; line-height: 1.4; background: white;
            width: 210mm; min-height: 297mm; padding: 20mm; box-sizing: border-box; border: 1px solid #ddd;
            margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .resume-preview h1 { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin: 0; color: black; text-align: center; }
        .resume-preview h2 { border-bottom: 2px solid #333; margin-top: 15px; margin-bottom: 8px; font-size: 13pt; font-weight: bold; text-transform: uppercase; text-align: left; color: black; }
        .template-standard header { display: flex !important; align-items: center !important; gap: 20px !important; border-bottom: 3px solid #1e3a8a !important; padding-bottom: 15px; text-align: left !important; }
        .template-standard #photo-preview { width: 110px; height: 140px; border: 1px solid #ddd; object-fit: cover; display: block !important; }
        .template-standard h2 { background: #1e3a8a !important; color: white !important; border: none !important; padding: 5px 10px !important; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; }
        .resume-preview ul { list-style-type: disc !important; margin-left: 1.2rem !important; }
        .section-content { font-size: 10.5pt; margin-bottom: 8px; }
        .ai-btn { background: linear-gradient(45deg, #1e3a8a, #3b82f6); color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; border: none; }

        /* --- LOGIK CETAKAN PROFESIONAL (MENGATASI ISU DALAM SCREENSHOT) --- */
        @media print {
            /* 1. Sembunyi semua elemen web kecuali resume-preview */
            body * { visibility: hidden; }
            #pdf-area, #pdf-area * { visibility: visible; }
            
            /* 2. Paksa resume memenuhi kertas A4 dan bermula dari bucu atas */
            #pdf-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 210mm !important;
                min-height: 297mm !important;
                border: none !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 15mm !important; /* Margin dalam kertas ikut sampel PDF */
            }
            
            .no-print { display: none !important; }
            @page { size: A4 portrait; margin: 0; }
        }

        /* Penyelarasan untuk paparan mobile/tablet */
        @media (max-width: 1024px) {
            .preview-container { overflow-x: auto; background: #eee; padding: 10px; }
            .resume-preview { transform: scale(0.45); transform-origin: top center; }
        }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-4">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <div class="bg-white p-4 md:p-6 rounded-lg shadow lg:h-[90vh] lg:overflow-y-auto border-t-8 border-blue-900 no-print">
            <div class="flex items-center gap-4 border-b-2 border-blue-900 pb-4 mb-6">
                <img src="https://drive.google.com/thumbnail?id=1MvbeFj62QwwzGHvUCNrmjYqX6IrWTQxN&sz=w200" alt="PUSKA" class="max-h-[50px]">
                <h1 class="text-xl font-black text-blue-900 uppercase">PUSKA Resume</h1>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl border border-blue-200 mb-6 space-y-3 text-xs">
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="font-bold">LEVEL</label><select id="level" class="w-full p-2 border rounded bg-white mt-1"><option>Undergraduate</option><option>Diploma</option></select></div>
                    <div><label class="font-bold">YEAR</label><select id="year" class="w-full p-2 border rounded bg-white mt-1"><option>Year 4</option></select></div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-2"><label class="font-bold">FACULTY</label>
                        <select id="faculty" class="w-full p-2 border rounded bg-white mt-1" onchange="runUpdate()">
                            <option>Faculty of Intelligent Computing</option>
                            <option>Faculty of Electronic Engineering & Technology</option>
                        </select>
                    </div>
                    <div><label class="font-bold text-red-600 uppercase">Current CGPA</label><input type="text" id="main_cgpa" placeholder="4.00" value="4.00" class="w-full p-2 border-2 border-blue-300 rounded mt-1 font-bold text-center" oninput="runUpdate()"></div>
                </div>
                <div><label class="font-bold uppercase">Program</label>
                    <select id="prog" class="w-full p-2 border rounded bg-white mt-1 font-semibold" onchange="runUpdate()">
                        <option>Bachelor of Data Science (Artificial Intelligence)</option>
                        <option>Bachelor of Electronic Engineering</option>
                    </select>
                </div>
            </div>

            <div class="space-y-6">
                <section class="p-4 border rounded-xl bg-white shadow-sm entry">
                    <h3 class="font-bold text-blue-900 uppercase text-xs mb-3">1. Personal Info</h3>
                    <input type="text" id="name" placeholder="FULL NAME" value="MUHAMAD ZUL IZZAT BIN JAMIL" class="w-full p-2 border rounded mb-2 font-bold uppercase" oninput="runUpdate()">
                    <input type="text" id="email" placeholder="zulizzat@unimap.edu.my" value="zulizzat@unimap.edu.my" class="w-full p-2 border rounded mb-2 text-sm" oninput="runUpdate()">
                    <input type="text" id="phone" placeholder="0135828069" value="0135828069" class="w-full p-2 border rounded mb-2 text-sm" oninput="runUpdate()">
                    <input type="text" id="address" placeholder="PASIR GUDANG, JOHOR" value="PASIR GUDANG, JOHOR" class="w-full p-2 border rounded mb-2 text-sm" oninput="runUpdate()">
                    <input type="text" id="linkedin" placeholder="LinkedIn URL" class="w-full p-2 border rounded text-sm" oninput="runUpdate()">
                </section>

                <section class="p-4 border rounded-xl bg-white shadow-sm"><div class="flex justify-between items-center mb-2"><h3 class="font-bold text-xs uppercase">2. Summary</h3><button onclick="askAI('summary')" class="ai-btn">✨ AI Help</button></div><textarea id="summary" class="w-full p-2 border rounded h-24 text-sm" oninput="runUpdate()">Final-year Bachelor of Data Science (Artificial Intelligence) student with a strong foundation in machine learning, data analysis, and statistical modeling.</textarea></section>

                <section class="p-4 border rounded-xl bg-gray-50 shadow-sm"><div class="flex justify-between items-center mb-2"><b>3. Education</b><button onclick="addEntry('edu-list')" class="bg-blue-600 text-white px-2 rounded">+</button></div><div id="edu-list"><div class="p-3 border bg-white rounded-lg entry mb-2 text-sm"><input type="text" value="UNIVERSITI MALAYSIA PERLIS" class="w-full border-b mb-1 font-bold" oninput="runUpdate()"><input type="text" value="Bachelor of Data Science (Artificial Intelligence)" class="w-full border-b mb-1" oninput="runUpdate()"><div class="grid grid-cols-2 gap-2 mt-1"><input type="text" placeholder="Start" class="border-b" oninput="runUpdate()"><input type="text" placeholder="End" class="border-b" oninput="runUpdate()"></div></div></div></section>

                <div class="mt-8 grid grid-cols-2 gap-3 pb-10">
                    <button onclick="location.reload()" class="bg-gray-400 text-white py-3 rounded-xl font-bold uppercase">Reset</button>
                    <button onclick="submitDatabase()" id="btnSubmit" class="bg-blue-800 text-white py-3 rounded-xl font-bold shadow-xl">Download & Submit</button>
                </div>
            </div>
        </div>

        <div class="preview-container">
            <div class="resume-preview" id="pdf-area">
                <header class="text-center">
                    <h1 id="p-name">MUHAMAD ZUL IZZAT BIN JAMIL</h1>
                    <p style="font-size: 11pt; margin: 5px 0;"><span id="p-email">zulizzat@unimap.edu.my</span> | <span id="p-phone">0135828069</span></p>
                    <p id="p-address" style="font-size: 10pt; font-weight: bold; margin-bottom: 10px;"></p>
                    <div id="p-linkedin-area" style="font-size: 10pt; margin-top: 2px;"></div>
                </header>
                <section><h2>PROFESSIONAL SUMMARY</h2><p id="p-summary" class="section-content text-justify"></p></section>
                <section><h2>EDUCATION</h2><div id="p-edu"></div></section>
                <section><h2>KEY PROJECTS</h2><div id="p-proj"></div></section>
                <div class="grid grid-cols-2 gap-8"><section><h2>TECHNICAL SKILLS</h2><p id="p-tech" class="section-content whitespace-pre-line"></p></section><section><h2>SOFT SKILLS</h2><p id="p-soft" class="section-content whitespace-pre-line"></p></section></div>
                <section><h2>REFERENCES</h2><div id="p-ref" class="grid grid-cols-2 gap-4"></div></section>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzARfeXIW1_uwtH5kiHNy7Hvu_sFfrNE7HW-PAMa5Cg3aareCYZ-qYJcQDSpOao-84z/exec';
        window.onload = runUpdate;

        function runUpdate() {
            document.getElementById('p-name').innerText = (document.getElementById('name').value || 'YOUR FULL NAME').toUpperCase();
            document.getElementById('p-email').innerText = document.getElementById('email').value || 'email@example.com';
            document.getElementById('p-phone').innerText = document.getElementById('phone').value || '012-3456789';
            document.getElementById('p-address').innerText = (document.getElementById('address').value || 'LOCATION').toUpperCase();
            document.getElementById('p-summary').innerText = document.getElementById('summary').value;
            
            const li = document.getElementById('linkedin').value;
            document.getElementById('p-linkedin-area').innerHTML = li ? `<a href="${li.startsWith('http')?li:'https://'+li}" target="_blank" style="color:#1e3a8a;font-weight:bold;text-decoration:none;">${li}</a>` : "";

            fillSection('edu-list', 'p-edu', i => `<div class="mb-3 text-[10.5pt]"><div class="item-header"><span>${i[0].value}</span><span>${i[2].value} - ${i[3].value}</span></div><i>${i[1].value}</i><br>CGPA: ${document.getElementById('main_cgpa').value || '0.00'}</div>`);
        }

        async function submitDatabase() {
            const btn = document.getElementById('btnSubmit'); btn.innerText = "Processing..."; btn.disabled = true;
            try {
                // 1. Jalankan cetakan PDF dahulu
                window.print();
                // 2. Simpan ke Database
                const payload = {
                    cgpa: document.getElementById('main_cgpa').value,
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    htmlForPdf: document.getElementById('pdf-area').outerHTML
                };
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ Success! Resume saved and ready to download.");
            } catch(e) { window.print(); } finally { btn.disabled = false; btn.innerText = "Download & Submit"; }
        }

        function fillSection(id, out, tmpl) { let h = ''; document.querySelectorAll(`#${id} .entry`).forEach(el => { const i = el.querySelectorAll('input'); if(i[0].value) h += tmpl(i); }); document.getElementById(out).innerHTML = h; }
        function addEntry(id) { const container = document.getElementById(id); const clone = container.children[0].cloneNode(true); clone.querySelectorAll('input, textarea').forEach(v => v.value = ''); container.appendChild(clone); runUpdate(); }
        function askAI(t) { let p = `Provide a resume ${t} for a ${document.getElementById('prog').value} student.`; navigator.clipboard.writeText(p).then(() => alert("AI Prompt Copied!")); }
    </script>
</body>
</html>
